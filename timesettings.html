<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間管理設定 | 配車管理システム</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0f1923; color: white; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    header { padding: 20px 32px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 16px; }
    .back-btn { background: rgba(255,255,255,0.08); border: none; color: white; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .back-btn:hover { background: rgba(255,255,255,0.15); }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    main { max-width: 860px; margin: 0 auto; padding: 28px 32px 80px; }

    .section { margin-bottom: 32px; }
    .section-title { font-size: 11px; letter-spacing: 0.15em; color: #f59e0b; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

    .card { background: #161f2c; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }

    /* 基本設定 */
    .basic-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 11px; color: rgba(255,255,255,0.45); }
    .form-group input, .form-group select {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: white; border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #f59e0b; }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }

    /* 段階テーブル */
    .table-desc { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 12px; line-height: 1.6; }
    .step-table { width: 100%; border-collapse: collapse; }
    .step-table th { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; padding: 6px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .step-table td { padding: 6px 6px; vertical-align: middle; }
    .step-table tr:not(:last-child) td { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .step-table input {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      color: white; border-radius: 5px; padding: 6px 10px; font-size: 13px;
      font-family: inherit; width: 100%;
    }
    .step-table input:focus { outline: none; border-color: #f59e0b; }
    .step-table .range-sep { color: rgba(255,255,255,0.3); font-size: 13px; padding: 0 4px; text-align: center; width: 16px; }
    .step-table .unit { color: rgba(255,255,255,0.35); font-size: 11px; padding-left: 6px; white-space: nowrap; }
    .btn-del { background: rgba(239,68,68,0.12); border: none; color: #f87171; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
    .btn-del:hover { background: rgba(239,68,68,0.22); }
    .btn-add { background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; margin-top: 10px; width: 100%; transition: all 0.15s; }
    .btn-add:hover { background: rgba(255,255,255,0.1); color: white; }

    /* ボタン */
    .actions { display: flex; gap: 10px; margin-top: 28px; }
    .btn-save { background: #f59e0b; color: #000; border: none; padding: 10px 28px; border-radius: 7px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 700; }
    .btn-save:hover { background: #d97706; }
    .btn-reset { background: rgba(255,255,255,0.06); border: none; color: rgba(255,255,255,0.5); padding: 10px 20px; border-radius: 7px; cursor: pointer; font-size: 14px; font-family: inherit; }
    .btn-reset:hover { background: rgba(255,255,255,0.12); }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 24px; border-radius: 20px; font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); z-index: 999; display: none; }

    .preview-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 12px 16px; margin-top: 14px; }
    .preview-box .preview-title { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
    .preview-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-chip { background: rgba(255,255,255,0.06); border-radius: 4px; padding: 4px 10px; font-size: 12px; color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="location.href='menu.html'">← メニュー</button>
  <div>
    <h1>⏱ 時間管理設定</h1>
    <p>荷下ろし・積み込み時間の段階設定、移動速度などを管理します</p>
  </div>
</header>

<main>

  <!-- 基本設定 -->
  <div class="section">
    <div class="section-title">🚗 基本設定</div>
    <div class="card">
      <div class="basic-grid">
        <div class="form-group">
          <label>平均移動速度（km/h）</label>
          <input type="number" id="speed" value="40" min="10" max="120">
        </div>
        <div class="form-group">
          <label>標準出発時刻</label>
          <input type="time" id="depart-time" value="07:00">
        </div>
        <div class="form-group">
          <label>デポ間距離（km）※往復</label>
          <input type="number" id="depot-dist" value="0" min="0" max="300">
        </div>
      </div>
    </div>
  </div>

  <!-- 荷下ろし時間 -->
  <div class="section">
    <div class="section-title">📦 荷下ろし時間（個数による段階設定）</div>
    <div class="card">
      <p class="table-desc">
        納品個数の範囲ごとに荷下ろし時間を設定します。<br>
        例：1〜10個 → 5分、11〜20個 → 10分、21個以上 → 15分
      </p>
      <table class="step-table" id="unload-table">
        <thead>
          <tr>
            <th style="width:80px;">個数（下限）</th>
            <th style="width:16px;"></th>
            <th style="width:80px;">個数（上限）</th>
            <th style="width:90px;">時間（分）</th>
            <th style="width:40px;"></th>
          </tr>
        </thead>
        <tbody id="unload-tbody"></tbody>
      </table>
      <button class="btn-add" onclick="addRow('unload')">＋ 行を追加</button>
      <div class="preview-box">
        <div class="preview-title">プレビュー</div>
        <div class="preview-row" id="unload-preview"></div>
      </div>
    </div>
  </div>

  <!-- 積み込み時間 -->
  <div class="section">
    <div class="section-title">🏭 積み込み時間（個数による段階設定）</div>
    <div class="card">
      <p class="table-desc">
        1便あたりの積み込み総個数の範囲ごとに積み込み時間を設定します。<br>
        例：1〜100個 → 15分、101〜200個 → 25分、201個以上 → 35分
      </p>
      <table class="step-table" id="load-table">
        <thead>
          <tr>
            <th style="width:80px;">個数（下限）</th>
            <th style="width:16px;"></th>
            <th style="width:80px;">個数（上限）</th>
            <th style="width:90px;">時間（分）</th>
            <th style="width:40px;"></th>
          </tr>
        </thead>
        <tbody id="load-tbody"></tbody>
      </table>
      <button class="btn-add" onclick="addRow('load')">＋ 行を追加</button>
      <div class="preview-box">
        <div class="preview-title">プレビュー</div>
        <div class="preview-row" id="load-preview"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-save" onclick="saveSettings()">💾 保存</button>
    <button class="btn-reset" onclick="resetDefaults()">デフォルトに戻す</button>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'haisha_time_settings';

const DEFAULTS = {
  speed: 40,
  departTime: '07:00',
  depotDist: 0,
  unloadSteps: [
    { from: 1,   to: 10,  min: 5  },
    { from: 11,  to: 20,  min: 8  },
    { from: 21,  to: 50,  min: 12 },
    { from: 51,  to: 999, min: 18 },
  ],
  loadSteps: [
    { from: 1,   to: 100, min: 15 },
    { from: 101, to: 200, min: 25 },
    { from: 201, to: 999, min: 35 },
  ],
};

let settings = JSON.parse(JSON.stringify(DEFAULTS));

function loadSettings() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) settings = JSON.parse(saved);
  } catch(e) {}
}

function saveSettings() {
  settings.speed      = Number(document.getElementById('speed').value) || 40;
  settings.departTime = document.getElementById('depart-time').value || '07:00';
  settings.depotDist  = Number(document.getElementById('depot-dist').value) || 0;
  settings.unloadSteps = readRows('unload');
  settings.loadSteps   = readRows('load');
  localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
  showToast('保存しました');
  updatePreviews();
}

function resetDefaults() {
  if (!confirm('デフォルト設定に戻しますか？')) return;
  settings = JSON.parse(JSON.stringify(DEFAULTS));
  applyToForm();
  showToast('デフォルトに戻しました');
}

function readRows(type) {
  const rows = document.querySelectorAll(`#${type}-tbody tr`);
  const steps = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const from = Number(inputs[0].value);
    const to   = Number(inputs[1].value);
    const min  = Number(inputs[2].value);
    if (from > 0 && to >= from && min > 0) steps.push({ from, to, min });
  });
  return steps.sort((a, b) => a.from - b.from);
}

function renderRows(type, steps) {
  const tbody = document.getElementById(`${type}-tbody`);
  tbody.innerHTML = '';
  steps.forEach((step, i) => {
    addRowWithData(type, step.from, step.to, step.min);
  });
  updatePreviews();
}

function addRow(type) {
  const steps = readRows(type);
  const lastTo = steps.length > 0 ? steps[steps.length - 1].to : 0;
  const lastMin = steps.length > 0 ? steps[steps.length - 1].min : 5;
  addRowWithData(type, lastTo + 1, lastTo + 10, lastMin + 5);
  updatePreviews();
}

function addRowWithData(type, from, to, min) {
  const tbody = document.getElementById(`${type}-tbody`);
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="number" value="${from}" min="1" oninput="updatePreviews()"></td>
    <td class="range-sep">〜</td>
    <td><input type="number" value="${to}" min="1" oninput="updatePreviews()"></td>
    <td><input type="number" value="${min}" min="1" oninput="updatePreviews()"> <span class="unit">分</span></td>
    <td><button class="btn-del" onclick="delRow(this)">削除</button></td>
  `;
  tbody.appendChild(tr);
}

function delRow(btn) {
  btn.closest('tr').remove();
  updatePreviews();
}

function updatePreviews() {
  ['unload', 'load'].forEach(type => {
    const steps = readRows(type);
    const el = document.getElementById(`${type}-preview`);
    if (steps.length === 0) { el.innerHTML = '<span style="color:rgba(255,255,255,0.2);font-size:12px;">設定なし</span>'; return; }
    el.innerHTML = steps.map(s =>
      `<div class="preview-chip">${s.from}〜${s.to}個 → ${s.min}分</div>`
    ).join('');
  });
}

function applyToForm() {
  document.getElementById('speed').value      = settings.speed;
  document.getElementById('depart-time').value = settings.departTime;
  document.getElementById('depot-dist').value  = settings.depotDist;
  renderRows('unload', settings.unloadSteps);
  renderRows('load',   settings.loadSteps);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

loadSettings();
applyToForm();
</script>
</body>
</html>
