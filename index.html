const DRIVER_COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4',

  '#ff9800','#9c27b0','#03a9f4','#8bc34a','#f44336'
];

let map, markers = [], routeLine = null, depotMarker = null;
let locations = [], currentDate = '', orderedLocations = [], currentBusho = 1;
let currentTab = 'all', selectedDriverTab = 0;
let drivers = [], assignments = {};
let currentDeliveryId = null;

function saveDrivers() { localStorage.setItem('haisha_drivers', JSON.stringify(drivers)); }
function loadDrivers() {

// ===== 部署・日付 =====
function setBusho(n) {
  currentBusho = 1; // 部署1固定
}

function parseExcelDate(val) {
  if (!val) return null;
  if (val instanceof Date) return fmt(val);
  if (typeof val === 'number') {
    const d = new Date(new Date(1899,11,30).getTime() + val * 86400000);
    return fmt(d);
  }
  const str = String(val).replace(/[\/\-年月]/g,'').replace('日','').trim();
  if (str.length === 8) return str;
  const d = new Date(val);
  if (!isNaN(d)) return fmt(d);
  return null;
}
function fmt(d) { return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function todayStr() { return fmt(new Date()); }

function getDeliveryDate(dateStr, busho) {
  if (!dateStr || dateStr.length !== 8) return '不明';
  let date = new Date(parseInt(dateStr.slice(0,4)), parseInt(dateStr.slice(4,6))-1, parseInt(dateStr.slice(6,8)));
  date.setDate(date.getDate() + 1);
  if (busho === 1) { if (date.getDay()===0) date.setDate(date.getDate()+1); }
  else { if (date.getDay()===6) date.setDate(date.getDate()+2); if (date.getDay()===0) date.setDate(date.getDate()+1); }
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${'日月火水木金土'[date.getDay()]}）`;
}

  setTimeout(loadPendingFile, 500);

// ===== CSV/Excel振り分け =====
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    loadCSV(file);
  } else {
    loadExcel(event);
  }
}

// ===== CSV読み込み =====
function loadCSV(file) {
  document.getElementById('status').textContent = 'CSV読み込み中...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      // エンコーディング自動判定（Shift-JIS対応）
      const buffer = e.target.result;
      const uint8 = new Uint8Array(buffer);
      let text = '';
      // Shift-JISで試みる
      try {
        const decoder = new TextDecoder('shift-jis');
        text = decoder.decode(uint8);
      } catch(err) {
        const decoder = new TextDecoder('utf-8');
        text = decoder.decode(uint8);
      }

      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { document.getElementById('status').textContent = 'データが見つかりません'; return; }

      // ヘッダー解析（クォート対応）
      function parseCSVLine(line) {
        const result = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += c; }
        }
        result.push(cur.trim());
        return result;
      }

      const headers = parseCSVLine(lines[0]);
      // 列インデックスを取得
      const nameIdx  = headers.findIndex(h => h.includes('届け先名') || h.includes('顧客名称'));
      const addrIdx  = headers.findIndex(h => h.includes('届け先住所') || h.includes('顧客住所1'));
      const itemIdx  = headers.findIndex(h => h === '出荷数' || h === '個数');
      const volIdx   = headers.findIndex(h => h === '明細才数' || h === '才数');
      const dateIdx  = headers.findIndex(h => h.includes('配送年月日') || h.includes('日付'));
      const codeIdx  = headers.findIndex(h => h.includes('届け先コード') || h.includes('顧客コード'));

      if (nameIdx < 0 || addrIdx < 0) {
        document.getElementById('status').textContent = '届け先名・住所の列が見つかりません';
        return;
      }

      // 届け先コードで集計
      const shopMap = new Map();
      const rows = lines.slice(1);

      rows.forEach(line => {
        if (!line.trim()) return;
        const cols = parseCSVLine(line);
        const code = codeIdx >= 0 ? cols[codeIdx] : cols[nameIdx];
        const name = cols[nameIdx] || '';
        const addr = cols[addrIdx] || '';
        const items = parseFloat(cols[itemIdx]) || 0;
        const vol   = parseFloat(cols[volIdx])   || 0;

        if (!name.trim() || !addr.trim()) return;

        if (!shopMap.has(code)) {
          shopMap.set(code, { name: name.trim(), addr: addr.trim(), items: 0, vol: 0 });
        }
        const shop = shopMap.get(code);
        shop.items += items;
        shop.vol   += vol;
      });

      // 配送日取得
      if (dateIdx >= 0 && rows[0]) {
        const firstRow = parseCSVLine(rows[0]);
        const dateVal = firstRow[dateIdx];
        if (dateVal) {
          const cleaned = dateVal.replace(/[^0-9]/g,'');
          if (cleaned.length === 8) currentDate = cleaned;
          else currentDate = todayStr();
        }
      } else {
        currentDate = todayStr();
      }

      // 拠点コードでデポを自動切り替え
      const csvCodes = [...new Set(rows.map(line => {
        if (!line.trim()) return null;
        const cols = parseCSVLine(line);
        const codeIdx2 = headers.findIndex(h => h.includes('配送拠点コード'));
        return codeIdx2 >= 0 ? cols[codeIdx2] : null;
      }).filter(Boolean))];
      if (csvCodes.length > 0) setDepotByCode(csvCodes[0]);

      // 地図にプロット
      markers.forEach(m => m.setMap(null)); markers = [];
      if (routeLine) { routeLine.setMap(null); routeLine = null; }
      locations = []; orderedLocations = []; assignments = {}; currentDeliveryId = null;

      const shops = Array.from(shopMap.values());
      document.getElementById('status').textContent = `${shops.length}件を地図に配置中...`;

      const geocoder = new google.maps.Geocoder();
      let processed = 0;

      shops.forEach((shop, i) => {
        geocoder.geocode({ address: shop.addr }, (results, status) => {
          processed++;
          if (status === 'OK') {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            const idx = locations.length;
            locations.push({
              name: shop.name, addr: shop.addr, lat, lng,
              items: shop.items, vol: parseFloat(shop.vol.toFixed(3))
            });
            const marker = new google.maps.Marker({
              position: { lat, lng }, map, title: shop.name,
              label: { text: String(idx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' }
            });
            marker.addListener('click', () => new google.maps.InfoWindow({
              content: `<div style="font-size:13px;"><b>${shop.name}</b><br><span style="color:#666;font-size:12px;">${shop.addr}</span><br><span style="font-size:12px;">個数: ${shop.items}個 / ${shop.vol.toFixed(2)}才</span></div>`
            }).open(map, marker));
            markers.push(marker);
          }
          if (processed === shops.length) {
            document.getElementById('status').textContent = `${locations.length}件を表示しました（CSV読み込み）`;
            updateSidebar(locations, false);
            if (locations.length > 0) {
              const bounds = new google.maps.LatLngBounds();
              bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
              locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
              map.fitBounds(bounds);
            }
          }
        });
      });

    } catch(err) {
      document.getElementById('status').textContent = 'CSVエラー: ' + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== Excel読み込み =====
function loadExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = '読み込み中...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { raw: false });
      const rowsRaw = XLSX.utils.sheet_to_json(sheet, { raw: true });
      if (rows.length === 0) { document.getElementById('status').textContent = 'データが見つかりません'; return; }
      const keys = Object.keys(rows[0]);
      const addrKey = keys.find(k => k.includes('顧客住所1') || k.includes('住所'));
      const nameKey = keys.find(k => k.includes('顧客名称') || k.includes('名称'));
      const itemKey = keys.find(k => k === '個数' || k.includes('数量'));
      const volKey  = keys.find(k => k === '才数' || k.includes('才'));
      const dateKey = keys.find(k => k.includes('日付'));
      if (!addrKey) { document.getElementById('status').textContent = '住所列が見つかりません'; return; }
      currentDate = (dateKey && rowsRaw[0][dateKey]) ? (parseExcelDate(rowsRaw[0][dateKey]) || todayStr()) : todayStr();
      markers.forEach(m => m.setMap(null)); markers = [];
      if (routeLine) { routeLine.setMap(null); routeLine = null; }
      locations = []; orderedLocations = []; assignments = {}; currentDeliveryId = null;
      document.getElementById('status').textContent = `${rows.length}件を地図に配置中...`;
      const geocoder = new google.maps.Geocoder();
      let processed = 0;
      rows.forEach((row, i) => {
        const addr  = row[addrKey];
        const name  = nameKey ? row[nameKey] : `配送先${i+1}`;
        const items = itemKey ? rowsRaw[i][itemKey] : null;
        const vol   = volKey  ? rowsRaw[i][volKey]  : null;
        if (!addr) { processed++; checkDone(processed, rows.length); return; }
        geocoder.geocode({ address: String(addr) }, (results, status) => {
          processed++;
          if (status === 'OK') {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            const idx = locations.length;
            locations.push({ name: String(name), addr: String(addr), lat, lng, items, vol });
            const marker = new google.maps.Marker({
              position: { lat, lng }, map, title: String(name),
              label: { text: String(idx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' }
            });
            marker.addListener('click', () => new google.maps.InfoWindow({
              content: `<div style="font-size:13px;"><b>${name}</b><br><span style="color:#666;font-size:12px;">${addr}</span>${items?`<br><span style="font-size:12px;">個数: ${items}個</span>`:''}${vol?`<span style="font-size:12px;"> / ${vol}才</span>`:''}</div>`
            }).open(map, marker));
            markers.push(marker);
          }
          checkDone(processed, rows.length);
        });
      });
    } catch(err) { document.getElementById('status').textContent = 'エラー: ' + err.message; }
  };
  reader.readAsArrayBuffer(file);
}

function checkDone(processed, total) {
  if (processed === total) {
    document.getElementById('status').textContent = `${locations.length}件を表示しました`;
    updateSidebar(locations, false);
    if (locations.length > 0) {
      const bounds = new google.maps.LatLngBounds();
      bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
      locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
      map.fitBounds(bounds);
    }
  }
}

function renderDriverTab() {
  const bar = document.getElementById('driver-tab-bar');
  const list = document.getElementById('driver-stop-list');
  bar.innerHTML = ''; list.innerHTML = '';
  if (drivers.length === 0) { list.innerHTML = '<p style="font-size:12px;color:#aaa;">ドライバーを登録してください</p>'; return; }
  const tabs = [{ id: -1, name: '未割当' }, ...drivers];
  tabs.forEach((d, idx) => {
    const btn = document.createElement('button');
    btn.className = 'driver-tab' + (idx===selectedDriverTab?' active':'');
    btn.textContent = d.name;
    if (idx===selectedDriverTab) {
      const color = d.id===-1 ? '#95a5a6' : DRIVER_COLORS[drivers.findIndex(x=>x.id===d.id)%DRIVER_COLORS.length];
      btn.style.background = color; btn.style.borderColor = color; btn.style.color='white';
    }
    btn.onclick = () => { selectedDriverTab = idx; renderDriverTab(); };

  });

  let targetLocs = selTab.id===-1
    ? locations.map((loc,i)=>({loc,i})).filter(({i})=>!assignments[i])
    : locations.map((loc,i)=>({loc,i})).filter(({i})=>assignments[i]&&assignments[i].driverId===selTab.id);
  if (targetLocs.length===0) { list.innerHTML='<p style="font-size:12px;color:#aaa;">店舗なし</p>'; return; }
  const driverIdx = selTab.id===-1 ? -1 : drivers.findIndex(x=>x.id===selTab.id);
  const color = driverIdx>=0 ? DRIVER_COLORS[driverIdx%DRIVER_COLORS.length] : '#95a5a6';
  const totalItems = targetLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);

  summary.textContent=`${targetLocs.length}件 / 個数: ${totalItems}個 / 才数: ${totalVol.toFixed(1)}才`;
  list.appendChild(summary);

    const bin = assignments[i]?assignments[i].bin:null;

    div.className='stop-item'; div.style.borderLeft=`4px solid ${color}`;
    div.innerHTML=`<div class="stop-header"><span class="stop-name">${loc.name}</span>${bin?`<span style="margin-left:auto;font-size:10px;background:${color};color:white;padding:1px 5px;border-radius:3px;">第${bin}便</span>`:''}</div><div class="stop-addr">${loc.addr}</div>${loc.items||loc.vol?`<div class="stop-meta">${loc.items?loc.items+'個':''}${loc.vol?' / '+loc.vol+'才':''}</div>`:''}`;
    div.onclick=()=>{map.panTo({lat:loc.lat,lng:loc.lng});map.setZoom(16);};
    list.appendChild(div);
  });
}

function drawRoute() {
  if (locations.length<2) { alert('配送先を2件以上読み込んでください'); return; }
  if (routeLine) routeLine.setMap(null);
  const routeIdx = nearestNeighbor(locations, DEPOT);
  orderedLocations = routeIdx.map(i=>locations[i]);
  routeLine = new google.maps.Polyline({ path: [{lat:DEPOT.lat,lng:DEPOT.lng},...orderedLocations.map(l=>({lat:l.lat,lng:l.lng})),{lat:DEPOT.lat,lng:DEPOT.lng}], geodesic:true, strokeColor:'#1D9E75', strokeOpacity:0.85, strokeWeight:3 });
  routeLine.setMap(map);
  markers.forEach(m=>m.setMap(null)); markers=[];
  orderedLocations.forEach((loc,i)=>{
    const locIdx=locations.indexOf(loc); const asgn=assignments[locIdx];
    const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#1D9E75';
    const marker=new google.maps.Marker({ position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name, label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'}, icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2} });
    marker.addListener('click',()=>new google.maps.InfoWindow({content:`<b>${i+1}番目: ${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${driverIdx>=0?drivers[driverIdx].name:'未割当'}</small>`}).open(map,marker));
    markers.push(marker);
  });
  updateSidebar(orderedLocations,true);
  document.getElementById('status').textContent='最適ルートを表示しました';
  const bounds=new google.maps.LatLngBounds();
  bounds.extend({lat:DEPOT.lat,lng:DEPOT.lng});
  orderedLocations.forEach(l=>bounds.extend({lat:l.lat,lng:l.lng}));
  map.fitBounds(bounds);
}

function clearRoute() {
  if (routeLine) { routeLine.setMap(null); routeLine=null; }
  markers.forEach(m=>m.setMap(null)); markers=[];
  locations.forEach((loc,i)=>{
    const asgn=assignments[i]; const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#e74c3c';

    markers.push(marker);
  });
  updateSidebar(locations,false); orderedLocations=[];
  document.getElementById('status').textContent=`${locations.length}件を表示しました`;
}

function renderAssignPanel() {
  const totalItems=locations.reduce((s,l)=>s+(Number(l.items)||0),0);
  document.getElementById('assign-summary').textContent=`配送先: ${locations.length}件 / 合計個数: ${totalItems}個 / ドライバー: ${drivers.length}名`;

    const myItems=myLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);

    content.appendChild(block);
    const body=document.getElementById(`driver-body-${driver.id}`);
    myLocs.forEach(({loc,i})=>{
      const bin=assignments[i]?assignments[i].bin:1;
      const item=document.createElement('div'); item.className='assign-stop-item';
      item.innerHTML=`<span class="asn">${loc.name}</span><span class="asm">${loc.items?loc.items+'個':''}</span><select onchange="changeAssignment(${i},'${driver.id}',this.value)"><option value="1" ${bin==1?'selected':''}>第1便</option><option value="2" ${bin==2?'selected':''}>第2便</option></select><button onclick="removeAssignment(${i})" style="background:#e74c3c;color:white;border:none;border-radius:3px;padding:1px 6px;cursor:pointer;font-size:11px;">×</button>`;
      body.appendChild(item);
    });
  });
  const unassigned=locations.map((loc,i)=>({loc,i})).filter(({i})=>!assignments[i]);
  if (unassigned.length>0) {
    const block=document.createElement('div'); block.className='assign-driver-block';
    block.innerHTML=`<div class="assign-driver-header" style="background:#eee;"><span>⬜ 未割り当て</span><span class="assign-driver-meta">${unassigned.length}件</span></div><div class="assign-driver-body" id="unassigned-body"></div>`;
    content.appendChild(block);

    unassigned.forEach(({loc,i})=>{
      const item=document.createElement('div'); item.className='assign-stop-item';
      item.innerHTML=`<span class="asn">${loc.name}</span><span class="asm">${loc.items?loc.items+'個':''}</span><select onchange="assignToDriver(${i},this.value)"><option value="">-- 担当者 --</option>${drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select>`;
      body.appendChild(item);
    });
  }
}
function changeAssignment(locIdx,driverId,bin) { assignments[locIdx]={driverId:parseInt(driverId)||driverId,bin:parseInt(bin)}; renderAssignPanel(); }
function removeAssignment(locIdx) { delete assignments[locIdx]; renderAssignPanel(); }
function assignToDriver(locIdx,driverId) { if(!driverId) return; assignments[locIdx]={driverId:parseInt(driverId)||driverId,bin:1}; renderAssignPanel(); }

function autoAssign() {
  if (drivers.length===0) { alert('ドライバーを先に登録してください'); return; }
  const sorted=locations.map((loc,i)=>({loc,i,items:Number(loc.items)||0})).sort((a,b)=>b.items-a.items);
  const totals=drivers.map(()=>0); assignments={};
  sorted.forEach(({i,items})=>{
    const minIdx=totals.indexOf(Math.min(...totals));
    assignments[i]={driverId:drivers[minIdx].id,bin:1}; totals[minIdx]+=items;
  });
  renderAssignPanel(); document.getElementById('status').textContent='自動振り分け完了（手動で調整できます）';
}

function applyAssign() {
  closeAllPanels();
  markers.forEach(m=>m.setMap(null)); markers=[];
  const locs=orderedLocations.length>0?orderedLocations:locations;
  locs.forEach((loc,i)=>{
    const locIdx=locations.indexOf(loc); const asgn=assignments[locIdx];
    const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#e74c3c';
    const marker=new google.maps.Marker({ position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name, label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'}, icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2} });
    const dName=driverIdx>=0?drivers[driverIdx].name:'未割当';
    const binStr=asgn&&asgn.bin?` / 第${asgn.bin}便`:'';
    marker.addListener('click',()=>new google.maps.InfoWindow({content:`<b>${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${dName}${binStr}</small>`}).open(map,marker));
    markers.push(marker);
  });
  updateSidebar(locs,orderedLocations.length>0);
  if (currentTab==='driver') renderDriverTab();
  document.getElementById('status').textContent='配車割り当てを地図に反映しました';
}

// ===== Supabase共有 =====
async function openSharePanel() {
  if (locations.length===0) { alert('先にExcelを読み込んでください'); return; }
  if (drivers.length===0)   { alert('先にドライバーを登録してください'); return; }

  document.getElementById('share-panel').style.display='block';
  document.getElementById('overlay').style.display='block';

  try {
    // 既存データ削除（同日・同部署）
    if (currentDeliveryId) {
      await sbClient.from('deliveries').delete().eq('id', currentDeliveryId);
    }

    // deliveriesテーブルに保存
    const { data: delData, error: delErr } = await sbClient
      .from('deliveries')
      .insert({ busho: currentBusho, delivery_date: currentDate })
      .select().single();
    if (delErr) throw delErr;
    currentDeliveryId = delData.id;

    // delivery_stopsに全店舗を保存
    const stops = locations.map((loc, i) => {
      const asgn = assignments[i];
      const driverIdx = asgn ? drivers.findIndex(d=>d.id===asgn.driverId) : -1;
      return {
        delivery_id: currentDeliveryId,
        stop_order: i + 1,
        name: loc.name,
        address: loc.addr,
        lat: loc.lat,
        lng: loc.lng,
        items: loc.items ? Number(loc.items) : null,
        vol: loc.vol ? Number(loc.vol) : null,
        driver_id: asgn ? String(asgn.driverId) : null,
        driver_name: driverIdx >= 0 ? drivers[driverIdx].name : null,
        bin: asgn ? asgn.bin : null,
        status: 'pending'
      };
    });

    const { error: stopsErr } = await sbClient.from('delivery_stops').insert(stops);
    if (stopsErr) throw stopsErr;

    // ドライバーごとのURLを生成
    const baseUrl = window.location.href.replace('index.html','') + 'driver.html';
    let html = `<p style="font-size:12px;color:#27ae60;font-weight:bold;margin-bottom:10px;">✅ 保存完了！ドライバーに以下のURLを共有してください</p>`;

    drivers.forEach(driver => {
      const myLocs = locations.filter((_,i) => assignments[i] && assignments[i].driverId === driver.id);
      if (myLocs.length === 0) return;
      const url = `${baseUrl}?delivery=${currentDeliveryId}&driver=${encodeURIComponent(driver.name)}`;
      html += `<div class="share-driver-item">
        <div>
          <div style="font-weight:bold;font-size:13px;">${driver.name}</div>
          <div style="font-size:11px;color:#888;">${myLocs.length}件</div>
        </div>
        <button class="copy-btn" onclick="copyUrl('${url}','${driver.name}')">URLをコピー</button>
      </div>`;
    });

    html += `<div style="margin-top:12px;padding:10px;background:#fff8e1;border-radius:6px;font-size:12px;color:#856404;">
      💡 ドライバーはAndroidスマホでURLを開くだけで自分の配送先が確認できます
    </div>`;
    content.innerHTML = html;

  } catch(err) {
    content.innerHTML = `<p style="color:#e74c3c;font-size:13px;">エラー: ${err.message}</p>`;
  }
}

function copyUrl(url, name) {
  navigator.clipboard.writeText(url).then(()=>{ alert(`${name}のURLをコピーしました`); }).catch(()=>{ prompt('URLをコピーしてください:', url); });
}

      myLocs.forEach(({loc},idx)=>wsData.push([idx+1,loc.name,loc.addr,loc.items!==null?loc.items:'',loc.vol!==null?loc.vol:'','']));
      wsData.push(['',DEPOT.name,DEPOT.addr,'','','帰着']);
      wsData.push([],['合計','','',myLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0),myLocs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0).toFixed(1),'']);
      const ws=XLSX.utils.aoa_to_sheet(wsData); ws['!cols']=[{wch:6},{wch:35},{wch:45},{wch:8},{wch:8},{wch:8}];
      XLSX.utils.book_append_sheet(wb,ws,`${driver.name}_${bin}便`.slice(0,31));
    });
  });
  if (wb.SheetNames.length===0) { alert('割り当てデータがありません'); return; }
  XLSX.writeFile(wb,`配車表_${currentBusho===1?'部署1':'部署2'}_${currentDate}.xlsx`);
}

function exportExcel() {
  const locs=orderedLocations.length>0?orderedLocations:locations;
  if (locs.length===0) { alert('先にデータを読み込んでください'); return; }
  const deliveryDate=getDeliveryDate(currentDate,currentBusho); const bushoName='部署1';
  const wsData=[['配送ルート表'],[`配送日: ${deliveryDate}　【${bushoName}】`],[],['順番','店舗名','住所','個数','才数','担当ドライバー','便']];
  wsData.push(['',DEPOT.name,DEPOT.addr,'','','','出発']);
  locs.forEach((loc,i)=>{
    const locIdx=locations.indexOf(loc); const asgn=assignments[locIdx];
    const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    wsData.push([i+1,loc.name,loc.addr,loc.items!==null?loc.items:'',loc.vol!==null?loc.vol:'',driverIdx>=0?drivers[driverIdx].name:'',asgn?`第${asgn.bin}便`:'']);
  });
  wsData.push(['',DEPOT.name,DEPOT.addr,'','','','帰着']);
  wsData.push([],['合計','','',locs.reduce((s,l)=>s+(Number(l.items)||0),0),locs.reduce((s,l)=>s+(Number(l.vol)||0),0).toFixed(1),'','']);
  const fileName=`配送ルート_${bushoName}_${currentDate}.xlsx`;
  // メニューからの出力用にsessionStorageに保存
  try { sessionStorage.setItem('lastExcelData', JSON.stringify({wsData, fileName})); } catch(e){}
  const ws=XLSX.utils.aoa_to_sheet(wsData); ws['!cols']=[{wch:6},{wch:35},{wch:45},{wch:8},{wch:8},{wch:14},{wch:6}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'配送ルート');
  XLSX.writeFile(wb,fileName);
}

function closeAllPanels() {
  ['driver-panel','assign-panel'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('overlay').style.display='none';
}
function dist(a,b) { const R=111,dlat=(b.lat-a.lat)*R,dlng=(b.lng-a.lng)*R*Math.cos((a.lat+b.lat)/2*Math.PI/180); return Math.sqrt(dlat*dlat+dlng*dlng); }
function nearestNeighbor(locs,start) {
  const n=locs.length,visited=new Array(n).fill(false),route=[];
  let cur=start;
  for(let i=0;i<n;i++){let best=-1,bd=Infinity;for(let j=0;j<n;j++){if(!visited[j]){const d=dist(cur,locs[j]);if(d<bd){bd=d;best=j;}}}visited[best]=true;route.push(best);cur=locs[best];}
  return route;
}

// メニューから渡されたファイルを自動読み込み
function loadPendingFile() {
  const fileName = sessionStorage.getItem('pendingFileName');
  const fileDataStr = sessionStorage.getItem('pendingFileData');
  if (!fileName || !fileDataStr) return;
  sessionStorage.removeItem('pendingFileName');
  sessionStorage.removeItem('pendingFileData');
  try {
    const arr = JSON.parse(fileDataStr);
    const uint8 = new Uint8Array(arr);
    const ext = fileName.split('.').pop().toLowerCase();
    document.getElementById('status').textContent = `${fileName} を読み込み中...`;
    if (ext === 'csv') {
      const blob = new Blob([uint8]);
      const file = new File([blob], fileName);
      loadCSV(file);
    } else {
      const workbook = XLSX.read(uint8, { type: 'array', cellDates: true });
      const fakeEvent = {
        target: { files: [new File([new Blob([uint8])], fileName)] }
      };
      // XLSXデータを直接処理
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { raw: false });
      const rowsRaw = XLSX.utils.sheet_to_json(sheet, { raw: true });
      processExcelData(rows, rowsRaw);
    }
  } catch(e) {
    document.getElementById('status').textContent = 'ファイル読み込みエラー: ' + e.message;
  }
}

// Excel処理を関数に分離
function processExcelData(rows, rowsRaw) {
  if (rows.length === 0) { document.getElementById('status').textContent = 'データが見つかりません'; return; }
  const keys = Object.keys(rows[0]);
  const addrKey = keys.find(k => k.includes('顧客住所1') || k.includes('住所'));
  const nameKey = keys.find(k => k.includes('顧客名称') || k.includes('名称'));
  const itemKey = keys.find(k => k === '個数' || k.includes('数量'));
  const volKey  = keys.find(k => k === '才数' || k.includes('才'));
  const dateKey = keys.find(k => k.includes('日付'));
  if (!addrKey) { document.getElementById('status').textContent = '住所列が見つかりません'; return; }
  currentDate = (dateKey && rowsRaw[0][dateKey]) ? (parseExcelDate(rowsRaw[0][dateKey]) || todayStr()) : todayStr();
  markers.forEach(m=>m.setMap(null)); markers=[];
  if (routeLine) { routeLine.setMap(null); routeLine=null; }
  locations=[]; orderedLocations=[]; assignments={}; currentDeliveryId=null;
  document.getElementById('status').textContent = `${rows.length}件を地図に配置中...`;
  const geocoder = new google.maps.Geocoder();
  let processed = 0;
  rows.forEach((row,i)=>{
    const addr=row[addrKey]; const name=nameKey?row[nameKey]:`配送先${i+1}`;
    const items=itemKey?rowsRaw[i][itemKey]:null; const vol=volKey?rowsRaw[i][volKey]:null;
    if (!addr){processed++;checkDone(processed,rows.length);return;}
    geocoder.geocode({address:String(addr)},(results,status)=>{
      processed++;
      if (status==='OK'){
        const lat=results[0].geometry.location.lat(); const lng=results[0].geometry.location.lng();
        const idx=locations.length;
        locations.push({name:String(name),addr:String(addr),lat,lng,items,vol});
        const marker=new google.maps.Marker({position:{lat,lng},map,title:String(name),label:{text:String(idx+1),color:'white',fontSize:'11px',fontWeight:'bold'}});
        marker.addListener('click',()=>new google.maps.InfoWindow({content:`<div style="font-size:13px;"><b>${name}</b><br><span style="color:#666;font-size:12px;">${addr}</span>${items?`<br><span style="font-size:12px;">個数: ${items}個</span>`:''}${vol?`<span style="font-size:12px;"> / ${vol}才</span>`:''}</div>`}).open(map,marker));
        markers.push(marker);
      }
      checkDone(processed,rows.length);
    });
  });
}
