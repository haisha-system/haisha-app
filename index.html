<script>
// ===== Supabase設定 =====
const SUPABASE_URL = 'https://hpycoozpspcxtesuzdpw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhweWNvb3pwc3BjeHRlc3V6ZHB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTEwMzgsImV4cCI6MjA5NDg2NzAzOH0._5uJmcBC7_-DwUW6JzXqlIXXn-NLluDO8BML8SGyaRA';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Supabase接続確認
async function checkSupabase() {
  try {
    const { error } = await sbClient.from('deliveries').select('id').limit(1);
    const el = document.getElementById('sb-status');
    if (el) el.textContent = error ? '' : '● DB接続済み';
  } catch(e) {}
}

// ===== 定数・状態 =====
// ===== 拠点設定（depot.htmlで管理） =====
let DEPOT = {
  lat: 34.6664, lng: 135.0059,
  name: 'メープルツリー神戸ロジスティクスセンター',
  addr: '兵庫県神戸市西区見津が丘7丁目1-3'
};

function loadDepotsFromStorage() {
  try {
    const d = localStorage.getItem('haisha_depots');
    const m = localStorage.getItem('haisha_mappings');
    if (d) window._depots   = JSON.parse(d);
    if (m) window._mappings = JSON.parse(m);
  } catch(e) {}
  if (!window._depots) {
    window._depots = [
      { id:1, name:'神戸デポ', loadAddr:'兵庫県神戸市西区見津が丘7丁目1-3', departAddr:'', csvCode:'2806', lat:34.6664, lng:135.0059 },
      { id:2, name:'丹波デポ', loadAddr:'兵庫県丹波市氷上町氷上10', departAddr:'', csvCode:'2805', lat:35.1167, lng:135.0167 }
    ];
    window._mappings = { '2806':1, '2805':2 };
  }
}

function setDepotByCode(csvCode) {
  if (!csvCode || !window._mappings) return;
  const depotId = window._mappings[csvCode];
  if (!depotId) return;
  const depot = (window._depots||[]).find(d => d.id == depotId);
  if (!depot) return;

  const useAddr = depot.departAddr || depot.loadAddr;
  DEPOT = {
    lat:  depot.lat  || 34.6664,
    lng:  depot.lng  || 135.0059,
    name: depot.name,
    addr: useAddr
  };

  // デポ情報をサイドバーに反映
  const nameEl = document.querySelector('.depot-name');
  const addrEl = document.querySelector('.depot-addr');
  if (nameEl) nameEl.textContent = depot.name;
  if (addrEl) addrEl.textContent = useAddr;

  // デポマーカーを更新
  if (depotMarker) {
    depotMarker.setPosition({ lat: DEPOT.lat, lng: DEPOT.lng });
    depotMarker.setTitle(DEPOT.name);
  }

  document.getElementById('status').textContent += ` ／ 拠点: ${depot.name}`;
}
const DRIVER_COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4',
  '#ff5722','#607d8b','#795548','#4caf50','#2196f3',
  '#ff9800','#9c27b0','#03a9f4','#8bc34a','#f44336'
];

let map, markers = [], routeLine = null, depotMarker = null;
let locations = [], currentDate = '', orderedLocations = [], currentBusho = 1;
let currentTab = 'all', selectedDriverTab = 0;
let drivers = [], assignments = {};
let currentDeliveryId = null;

function saveDrivers() { localStorage.setItem('haisha_drivers', JSON.stringify(drivers)); }
function loadDrivers() {
  try { const d = localStorage.getItem('haisha_drivers'); if (d) drivers = JSON.parse(d); } catch(e) { drivers = []; }
}

// ===== 部署・日付 =====
function setBusho(n) {
  currentBusho = 1; // 部署1固定
}

function parseExcelDate(val) {
  if (!val) return null;
  if (val instanceof Date) return fmt(val);
  if (typeof val === 'number') {
    const d = new Date(new Date(1899,11,30).getTime() + val * 86400000);
    return fmt(d);
  }
  const str = String(val).replace(/[\/\-年月]/g,'').replace('日','').trim();
  if (str.length === 8) return str;
  const d = new Date(val);
  if (!isNaN(d)) return fmt(d);
  return null;
}
function fmt(d) { return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function todayStr() { return fmt(new Date()); }

function getDeliveryDate(dateStr, busho) {
  if (!dateStr || dateStr.length !== 8) return '不明';
  let date = new Date(parseInt(dateStr.slice(0,4)), parseInt(dateStr.slice(4,6))-1, parseInt(dateStr.slice(6,8)));
  date.setDate(date.getDate() + 1);
  if (busho === 1) { if (date.getDay()===0) date.setDate(date.getDate()+1); }
  else { if (date.getDay()===6) date.setDate(date.getDate()+2); if (date.getDay()===0) date.setDate(date.getDate()+1); }
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${'日月火水木金土'[date.getDay()]}）`;
}

// ===== 地図初期化 =====
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), { center: { lat: 34.76, lng: 134.85 }, zoom: 11 });
  depotMarker = new google.maps.Marker({
    position: { lat: DEPOT.lat, lng: DEPOT.lng }, map, title: DEPOT.name,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: '#8e44ad', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 },
    label: { text: '出', color: 'white', fontSize: '10px', fontWeight: 'bold' }
  });
  depotMarker.addListener('click', () => new google.maps.InfoWindow({ content: `<b>🏭 出発地</b><br>${DEPOT.name}<br><small>${DEPOT.addr}</small>` }).open(map, depotMarker));
  setTimeout(() => {
    loadPendingFile();
    // pendingFileがなければsessionStorageから復元
    if (!sessionStorage.getItem('pendingFileName') && !sessionStorage.getItem('pendingFileData')) {
      if (loadLocationsFromSession()) {
        // マーカーを再描画
        markers.forEach(m => m.setMap(null)); markers = [];
        locations.forEach((loc, i) => {
          const asgn = assignments[i];
          const driverIdx = asgn ? drivers.findIndex(d => d.id === asgn.driverId) : -1;
          const fillColor = driverIdx >= 0 ? ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4','#ff5722','#607d8b','#795548','#4caf50','#2196f3','#ff9800','#9c27b0','#03a9f4','#8bc34a','#f44336'][driverIdx % 20] : '#e74c3c';
          const marker = new google.maps.Marker({
            position: { lat: loc.lat, lng: loc.lng }, map, title: loc.name,
            label: { text: String(i+1), color: 'white', fontSize: '11px', fontWeight: 'bold' },
            icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor, fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
          });
          marker.addListener('click', () => new google.maps.InfoWindow({
            content: `<b>${loc.name}</b><br><small>${loc.addr}</small>`
          }).open(map, marker));
          markers.push(marker);
        });
        updateSidebar(locations, false);
        if (locations.length > 0) {
          const bounds = new google.maps.LatLngBounds();
          bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
          locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
          map.fitBounds(bounds);
          document.getElementById('status').textContent = `${locations.length}件（前回データ復元）`;
          if (depotMarker) depotMarker.setPosition({ lat: DEPOT.lat, lng: DEPOT.lng });
        }
      }
    }
  }, 500);
}

// ===== CSV/Excel振り分け =====
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    loadCSV(file);
  } else {
    loadExcel(event);
  }
}

// ===== CSV読み込み =====
function loadCSV(file) {
  document.getElementById('status').textContent = 'CSV読み込み中...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      // エンコーディング自動判定（Shift-JIS対応）
      const buffer = e.target.result;
      const uint8 = new Uint8Array(buffer);
      let text = '';
      // Shift-JISで試みる
      try {
        const decoder = new TextDecoder('shift-jis');
        text = decoder.decode(uint8);
      } catch(err) {
        const decoder = new TextDecoder('utf-8');
        text = decoder.decode(uint8);
      }

      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { document.getElementById('status').textContent = 'データが見つかりません'; return; }

      // ヘッダー解析（クォート対応）
      function parseCSVLine(line) {
        const result = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += c; }
        }
        result.push(cur.trim());
        return result;
      }

      const headers = parseCSVLine(lines[0]);
      // 列インデックスを取得
      const nameIdx  = headers.findIndex(h => h.includes('届け先名') || h.includes('顧客名称'));
      const addrIdx  = headers.findIndex(h => h.includes('届け先住所') || h.includes('顧客住所1'));
      const itemIdx  = headers.findIndex(h => h === '出荷数' || h === '個数');
      const volIdx   = headers.findIndex(h => h === '明細才数' || h === '才数');
      const dateIdx  = headers.findIndex(h => h.includes('配送年月日') || h.includes('日付'));
      const codeIdx  = headers.findIndex(h => h.includes('届け先コード') || h.includes('顧客コード'));

      if (nameIdx < 0 || addrIdx < 0) {
        document.getElementById('status').textContent = '届け先名・住所の列が見つかりません';
        return;
      }

      // 届け先コードで集計
      const shopMap = new Map();
      const rows = lines.slice(1);

      rows.forEach(line => {
        if (!line.trim()) return;
        const cols = parseCSVLine(line);
        const code = codeIdx >= 0 ? cols[codeIdx] : cols[nameIdx];
        const name = cols[nameIdx] || '';
        const addr = cols[addrIdx] || '';
        const items = parseFloat(cols[itemIdx]) || 0;
        const vol   = parseFloat(cols[volIdx])   || 0;

        if (!name.trim() || !addr.trim()) return;

        if (!shopMap.has(code)) {
          shopMap.set(code, { name: name.trim(), addr: addr.trim(), items: 0, vol: 0 });
        }
        const shop = shopMap.get(code);
        shop.items += items;
        shop.vol   += vol;
      });

      // 配送日取得
      if (dateIdx >= 0 && rows[0]) {
        const firstRow = parseCSVLine(rows[0]);
        const dateVal = firstRow[dateIdx];
        if (dateVal) {
          const cleaned = dateVal.replace(/[^0-9]/g,'');
          if (cleaned.length === 8) currentDate = cleaned;
          else currentDate = todayStr();
        }
      } else {
        currentDate = todayStr();
      }

      // 拠点コードでデポを自動切り替え
      const csvCodes = [...new Set(rows.map(line => {
        if (!line.trim()) return null;
        const cols = parseCSVLine(line);
        const codeIdx2 = headers.findIndex(h => h.includes('配送拠点コード'));
        return codeIdx2 >= 0 ? cols[codeIdx2] : null;
      }).filter(Boolean))];
      if (csvCodes.length > 0) setDepotByCode(csvCodes[0]);

      // 地図にプロット
      markers.forEach(m => m.setMap(null)); markers = [];
      if (routeLine) { routeLine.setMap(null); routeLine = null; }
      locations = []; orderedLocations = []; assignments = {}; currentDeliveryId = null;

      const shops = Array.from(shopMap.values());
      document.getElementById('status').textContent = `${shops.length}件を地図に配置中...`;

      const geocoder = new google.maps.Geocoder();
      let processed = 0;

      shops.forEach((shop, i) => {
        geocoder.geocode({ address: shop.addr }, (results, status) => {
          processed++;
          if (status === 'OK') {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            const idx = locations.length;
            locations.push({
              name: shop.name, addr: shop.addr, lat, lng,
              items: shop.items, vol: parseFloat(shop.vol.toFixed(3))
            });
            const marker = new google.maps.Marker({
              position: { lat, lng }, map, title: shop.name,
              label: { text: String(idx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' }
            });
            marker.addListener('click', () => new google.maps.InfoWindow({
              content: `<div style="font-size:13px;"><b>${shop.name}</b><br><span style="color:#666;font-size:12px;">${shop.addr}</span><br><span style="font-size:12px;">個数: ${shop.items}個 / ${shop.vol.toFixed(2)}才</span></div>`
            }).open(map, marker));
            markers.push(marker);
          }
          if (processed === shops.length) {
            document.getElementById('status').textContent = `${locations.length}件を表示しました（CSV読み込み）`;
            updateSidebar(locations, false);
            if (locations.length > 0) {
              const bounds = new google.maps.LatLngBounds();
              bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
              locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
              map.fitBounds(bounds);
            }
          }
        });
      });

    } catch(err) {
      document.getElementById('status').textContent = 'CSVエラー: ' + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== Excel読み込み =====
function loadExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = '読み込み中...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { raw: false });
      const rowsRaw = XLSX.utils.sheet_to_json(sheet, { raw: true });
      if (rows.length === 0) { document.getElementById('status').textContent = 'データが見つかりません'; return; }
      const keys = Object.keys(rows[0]);
      const addrKey = keys.find(k => k.includes('顧客住所1') || k.includes('住所'));
      const nameKey = keys.find(k => k.includes('顧客名称') || k.includes('名称'));
      const itemKey = keys.find(k => k === '個数' || k.includes('数量'));
      const volKey  = keys.find(k => k === '才数' || k.includes('才'));
      const dateKey = keys.find(k => k.includes('日付'));
      if (!addrKey) { document.getElementById('status').textContent = '住所列が見つかりません'; return; }
      currentDate = (dateKey && rowsRaw[0][dateKey]) ? (parseExcelDate(rowsRaw[0][dateKey]) || todayStr()) : todayStr();
      markers.forEach(m => m.setMap(null)); markers = [];
      if (routeLine) { routeLine.setMap(null); routeLine = null; }
      locations = []; orderedLocations = []; assignments = {}; currentDeliveryId = null;
      document.getElementById('status').textContent = `${rows.length}件を地図に配置中...`;
      const geocoder = new google.maps.Geocoder();
      let processed = 0;
      rows.forEach((row, i) => {
        const addr  = row[addrKey];
        const name  = nameKey ? row[nameKey] : `配送先${i+1}`;
        const items = itemKey ? rowsRaw[i][itemKey] : null;
        const vol   = volKey  ? rowsRaw[i][volKey]  : null;
        if (!addr) { processed++; checkDone(processed, rows.length); return; }
        geocoder.geocode({ address: String(addr) }, (results, status) => {
          processed++;
          if (status === 'OK') {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            const idx = locations.length;
            locations.push({ name: String(name), addr: String(addr), lat, lng, items, vol });
            const marker = new google.maps.Marker({
              position: { lat, lng }, map, title: String(name),
              label: { text: String(idx+1), color: 'white', fontSize: '11px', fontWeight: 'bold' }
            });
            marker.addListener('click', () => new google.maps.InfoWindow({
              content: `<div style="font-size:13px;"><b>${name}</b><br><span style="color:#666;font-size:12px;">${addr}</span>${items?`<br><span style="font-size:12px;">個数: ${items}個</span>`:''}${vol?`<span style="font-size:12px;"> / ${vol}才</span>`:''}</div>`
            }).open(map, marker));
            markers.push(marker);
          }
          checkDone(processed, rows.length);
        });
      });
    } catch(err) { document.getElementById('status').textContent = 'エラー: ' + err.message; }
  };
  reader.readAsArrayBuffer(file);
}

function checkDone(processed, total) {
  if (processed === total) {
    document.getElementById('status').textContent = `${locations.length}件を表示しました`;
    updateSidebar(locations, false);
    if (locations.length > 0) {
      const bounds = new google.maps.LatLngBounds();
      bounds.extend({ lat: DEPOT.lat, lng: DEPOT.lng });
      locations.forEach(l => bounds.extend({ lat: l.lat, lng: l.lng }));
      map.fitBounds(bounds);
    }
    // データをsessionStorageに保存（メニューに戻っても復元できる）
    saveLocationsToSession();
  }
}

function saveLocationsToSession() {
  try {
    sessionStorage.setItem('haisha_locations', JSON.stringify(locations));
    sessionStorage.setItem('haisha_currentDate', currentDate);
    sessionStorage.setItem('haisha_assignments', JSON.stringify(assignments));
    sessionStorage.setItem('haisha_depot', JSON.stringify(DEPOT));
  } catch(e) { console.warn('sessionStorage保存失敗:', e); }
}

function loadLocationsFromSession() {
  try {
    const locs = sessionStorage.getItem('haisha_locations');
    const date = sessionStorage.getItem('haisha_currentDate');
    const asgn = sessionStorage.getItem('haisha_assignments');
    const depot = sessionStorage.getItem('haisha_depot');
    if (!locs) return false;
    locations = JSON.parse(locs);
    if (date) currentDate = date;
    if (asgn) assignments = JSON.parse(asgn);
    if (depot) {
      const d = JSON.parse(depot);
      DEPOT.lat = d.lat; DEPOT.lng = d.lng; DEPOT.name = d.name; DEPOT.addr = d.addr;
      const nameEl = document.querySelector('.depot-name');
      const addrEl = document.querySelector('.depot-addr');
      if (nameEl) nameEl.textContent = d.name;
      if (addrEl) addrEl.textContent = d.addr;
    }
    return true;
  } catch(e) { return false; }
}

// ===== タブ =====
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab==='all');
  document.getElementById('tab-driver').classList.toggle('active', tab==='driver');
  document.getElementById('tab-all-content').style.display    = tab==='all'    ? '' : 'none';
  document.getElementById('tab-driver-content').style.display = tab==='driver' ? '' : 'none';
  if (tab === 'driver') renderDriverTab();
}

function renderDriverTab() {
  const bar = document.getElementById('driver-tab-bar');
  const list = document.getElementById('driver-stop-list');
  bar.innerHTML = ''; list.innerHTML = '';
  if (drivers.length === 0) { list.innerHTML = '<p style="font-size:12px;color:#aaa;">ドライバーを登録してください</p>'; return; }
  const tabs = [{ id: -1, name: '未割当' }, ...drivers];
  tabs.forEach((d, idx) => {
    const btn = document.createElement('button');
    btn.className = 'driver-tab' + (idx===selectedDriverTab?' active':'');
    btn.textContent = d.name;
    if (idx===selectedDriverTab) {
      const color = d.id===-1 ? '#95a5a6' : DRIVER_COLORS[drivers.findIndex(x=>x.id===d.id)%DRIVER_COLORS.length];
      btn.style.background = color; btn.style.borderColor = color; btn.style.color='white';
    }
    btn.onclick = () => {
      selectedDriverTab = idx;
      renderDriverTab();
      // ルート表示中ならドライバーフィルター適用
      if (routeLines.length > 0 && d.id !== -1) filterRouteByDriver(d.id);
    };
    bar.appendChild(btn);
  });
  const selTab = tabs[selectedDriverTab];
  let targetLocs = selTab.id===-1
    ? locations.map((loc,i)=>({loc,i})).filter(({i})=>!assignments[i])
    : locations.map((loc,i)=>({loc,i})).filter(({i})=>assignments[i]&&assignments[i].driverId===selTab.id);
  if (targetLocs.length===0) { list.innerHTML='<p style="font-size:12px;color:#aaa;">店舗なし</p>'; return; }
  const driverIdx = selTab.id===-1 ? -1 : drivers.findIndex(x=>x.id===selTab.id);
  const color = driverIdx>=0 ? DRIVER_COLORS[driverIdx%DRIVER_COLORS.length] : '#95a5a6';
  const totalItems = targetLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);
  const totalVol   = targetLocs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0);
  const summary = document.createElement('div');
  summary.style.cssText='font-size:11px;color:#666;margin-bottom:8px;padding:4px 8px;background:#f0f0f0;border-radius:4px;';
  summary.textContent=`${targetLocs.length}件 / 個数: ${totalItems}個 / 才数: ${totalVol.toFixed(1)}才`;
  list.appendChild(summary);
  targetLocs.forEach(({loc,i})=>{
    const bin = assignments[i]?assignments[i].bin:null;
    const div = document.createElement('div');
    div.className='stop-item'; div.style.borderLeft=`4px solid ${color}`;
    div.innerHTML=`<div class="stop-header"><span class="stop-name">${loc.name}</span>${bin?`<span style="margin-left:auto;font-size:10px;background:${color};color:white;padding:1px 5px;border-radius:3px;">第${bin}便</span>`:''}</div><div class="stop-addr">${loc.addr}</div>${loc.items||loc.vol?`<div class="stop-meta">${loc.items?loc.items+'個':''}${loc.vol?' / '+loc.vol+'才':''}</div>`:''}`;
    div.onclick=()=>{map.panTo({lat:loc.lat,lng:loc.lng});map.setZoom(16);};
    list.appendChild(div);
  });
}

// ===== サイドバー =====
function updateSidebar(locs, isOptimal) {
  document.getElementById('sidebar-title').textContent = isOptimal ? `最適配送順序（${locs.length}件）` : `配送先リスト（${locs.length}件）`;
  const list = document.getElementById('stop-list');
  list.innerHTML = '';
  locs.forEach((loc, i) => {
    const locIdx = locations.indexOf(loc);
    const asgn = assignments[locIdx];
    const driverIdx = asgn ? drivers.findIndex(d=>d.id===asgn.driverId) : -1;
    const color = driverIdx>=0 ? DRIVER_COLORS[driverIdx%DRIVER_COLORS.length] : null;
    const driverName = driverIdx>=0 ? drivers[driverIdx].name : null;
    const div = document.createElement('div');
    div.className = 'stop-item';
    if (color) div.style.borderLeft = `4px solid ${color}`;
    div.innerHTML = `<div class="stop-header"><span class="stop-num ${isOptimal?'optimal':''}">${i+1}</span><span class="stop-name">${loc.name}</span>${driverName?`<span style="margin-left:auto;font-size:10px;background:${color};color:white;padding:1px 5px;border-radius:3px;">${driverName}${asgn.bin?' '+asgn.bin+'便':''}</span>`:''}</div><div class="stop-addr">${loc.addr}</div>${loc.items||loc.vol?`<div class="stop-meta">${loc.items?loc.items+'個':''}${loc.vol?' / '+loc.vol+'才':''}</div>`:''}`;
    div.onclick=()=>{map.panTo({lat:loc.lat,lng:loc.lng});map.setZoom(16);};
    list.appendChild(div);
  });
}

// ===== ルート =====
// 複数ルートライン管理
let routeLines = []; // 全ルートライン
let activeDriverFilter = null; // null=全員表示

function drawRoute() {
  if (locations.length < 1) { alert('配送先を読み込んでください'); return; }
  clearRouteLines();
  markers.forEach(m => m.setMap(null)); markers = [];
  orderedLocations = [];
  activeDriverFilter = null;

  // ドライバーごとにルートを描画
  const assignedDriverIds = [...new Set(
    Object.values(assignments).map(a => a.driverId)
  )];

  if (assignedDriverIds.length === 0) {
    // 割り当てなし→全店舗を1本のルートで表示
    const routeIdx = nearestNeighbor(locations, DEPOT);
    orderedLocations = routeIdx.map(i => locations[i]);
    const line = new google.maps.Polyline({
      path: [{lat:DEPOT.lat,lng:DEPOT.lng},...orderedLocations.map(l=>({lat:l.lat,lng:l.lng})),{lat:DEPOT.lat,lng:DEPOT.lng}],
      geodesic:true, strokeColor:'#1D9E75', strokeOpacity:0.85, strokeWeight:3
    });
    line.setMap(map);
    routeLines.push({ line, driverId: null });
    orderedLocations.forEach((loc,i) => {
      const marker = new google.maps.Marker({
        position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
        label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'},
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
      });
      marker.addListener('click', () => highlightStopCard(locations.indexOf(loc)));
      markers.push(marker);
    });
    document.getElementById('status').textContent = `全${orderedLocations.length}件のルートを表示しました（割り当てなし）`;
  } else {
    // ドライバーごとにルート描画
    let totalStops = 0;
    assignedDriverIds.forEach(driverId => {
      const driverIdx = drivers.findIndex(d => d.id === driverId);
      const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : '#aaa';
      const driverName = driverIdx >= 0 ? drivers[driverIdx].name : '不明';

      // このドライバーの店舗（便順でソート）
      const driverLocs = [];
      [1, 2].forEach(bin => {
        const binLocs = locations.map((loc,i) => ({loc,i}))
          .filter(({i}) => assignments[i] && assignments[i].driverId === driverId && assignments[i].bin === bin);
        if (binLocs.length === 0) return;

        // 最近傍法でルート最適化
        const locs = binLocs.map(({loc}) => loc);
        const routeIdx = nearestNeighbor(locs, DEPOT);
        const ordered = routeIdx.map(i => locs[i]);

        const path = [{lat:DEPOT.lat,lng:DEPOT.lng}, ...ordered.map(l=>({lat:l.lat,lng:l.lng})), {lat:DEPOT.lat,lng:DEPOT.lng}];
        const line = new google.maps.Polyline({
          path, geodesic:true,
          strokeColor: color,
          strokeOpacity: 0.85,
          strokeWeight: bin === 1 ? 4 : 3,
          strokePattern: bin === 2 ? [{icon:{path:'M 0,-1 0,1',strokeOpacity:1,scale:3},offset:'0',repeat:'12px'}] : null
        });
        line.setMap(map);
        routeLines.push({ line, driverId, bin });

        // マーカー描画（通し番号）
        ordered.forEach((loc) => {
          totalStops++;
          const marker = new google.maps.Marker({
            position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
            label:{text:String(totalStops),color:'white',fontSize:'10px',fontWeight:'bold'},
            icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
          });
          marker.addListener('click', () => {
            highlightStopCard(locations.indexOf(loc));
            new google.maps.InfoWindow({
              content:`<b>${totalStops}番目: ${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${driverName} / 第${bin}便</small>`
            }).open(map, marker);
          });
          markers.push(marker);
          driverLocs.push(loc);
        });
      });
      orderedLocations.push(...driverLocs);
    });
    document.getElementById('status').textContent = `${assignedDriverIds.length}名・${totalStops}件のルートを表示しました`;
  }

  // 地図範囲を調整
  const bounds = new google.maps.LatLngBounds();
  bounds.extend({lat:DEPOT.lat,lng:DEPOT.lng});
  (orderedLocations.length > 0 ? orderedLocations : locations).forEach(l => bounds.extend({lat:l.lat,lng:l.lng}));
  map.fitBounds(bounds);

  updateSidebar(orderedLocations.length > 0 ? orderedLocations : locations, true);
  renderDriverSidebar();
}

function clearRouteLines() {
  routeLines.forEach(({line}) => line.setMap(null));
  routeLines = [];
  if (routeLine) { routeLine.setMap(null); routeLine = null; }
}

// 特定ドライバーのルートだけ表示
function filterRouteByDriver(driverId) {
  if (activeDriverFilter === driverId && driverId !== 'unassigned') {
    // 同じドライバーをもう一度押したら全員表示に戻す
    activeDriverFilter = null;
    routeLines.forEach(({line}) => line.setMap(map));
    markers.forEach(m => m.setMap(map));
    document.getElementById('status').textContent = '全ドライバーのルートを表示しました';
  } else {
    activeDriverFilter = driverId;
    routeLines.forEach(({line, driverId: rid}) => {
      line.setMap(rid === driverId || rid === null ? map : null);
    });
    markers.forEach(m => m.setMap(null));
    markers = [];
    // 該当ドライバーの店舗を便順・ルート順で番号付き表示
    const driverIdx = drivers.findIndex(d => d.id === driverId);
    const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : '#aaa';
    const dName = driverIdx >= 0 ? drivers[driverIdx].name : '不明';
    let stopNum = 0;
    [1, 2].forEach(bin => {
      const binLocs = locations.map((loc, i) => ({loc, i}))
        .filter(({i}) => assignments[i] && assignments[i].driverId === driverId && assignments[i].bin === bin);
      if (binLocs.length === 0) return;
      const locs = binLocs.map(({loc}) => loc);
      const routeIdx = nearestNeighbor(locs, DEPOT);
      routeIdx.forEach(ri => {
        stopNum++;
        const loc = locs[ri];
        const marker = new google.maps.Marker({
          position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
          label:{text:String(stopNum),color:'white',fontSize:'11px',fontWeight:'bold'},
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
        });
        marker.addListener('click', () => new google.maps.InfoWindow({
          content:`<b>${stopNum}番目: ${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${dName} / 第${bin}便</small>`
        }).open(map, marker));
        markers.push(marker);
      });
    });
    document.getElementById('status').textContent = `${dName}のルートを表示中 ${stopNum}件（もう一度押すと全員表示）`;
  }
}

function clearRoute() {
  clearRouteLines();
  markers.forEach(m=>m.setMap(null)); markers=[];
  activeDriverFilter = null;
  locations.forEach((loc,i)=>{
    const asgn=assignments[i]; const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#e74c3c';
    const marker=new google.maps.Marker({
      position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
      label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'},
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
    });
    markers.push(marker);
  });
  updateSidebar(locations,false); orderedLocations=[];
  document.getElementById('status').textContent=`${locations.length}件を表示しました`;
}

// ===== ドライバー管理 =====
function openDriverPanel() { renderDriverList(); document.getElementById('driver-panel').style.display='block'; document.getElementById('overlay').style.display='block'; }
function renderDriverList() {
  const c=document.getElementById('driver-list-container'); c.innerHTML='';
  if (drivers.length===0) { c.innerHTML='<p style="font-size:12px;color:#aaa;margin-bottom:8px;">ドライバーが登録されていません</p>'; return; }
  drivers.forEach((d,idx)=>{
    const color=DRIVER_COLORS[idx%DRIVER_COLORS.length];
    const div=document.createElement('div'); div.className='driver-list-item';
    div.innerHTML=`<span style="width:12px;height:12px;border-radius:50%;background:${color};display:inline-block;margin-right:8px;"></span><span style="flex:1;">${d.name}</span><button class="ddel" onclick="removeDriver(${d.id})">削除</button>`;
    c.appendChild(div);
  });
}
function addDriver() {
  const input=document.getElementById('driver-name-input'); const name=input.value.trim();
  if (!name) return;
  drivers.push({id:Date.now(),name}); saveDrivers(); input.value=''; renderDriverList();
}
function removeDriver(id) {
  drivers=drivers.filter(d=>d.id!==id);
  Object.keys(assignments).forEach(k=>{if(assignments[k].driverId===id)delete assignments[k];});
  saveDrivers(); renderDriverList();
}

// ===== 配車割り当て =====
function openAssignPanel() {
  if (locations.length===0) { alert('先にExcelを読み込んでください'); return; }
  if (drivers.length===0)   { alert('先にドライバーを登録してください'); return; }
  renderAssignPanel(); document.getElementById('assign-panel').style.display='block'; document.getElementById('overlay').style.display='block';
}
function renderAssignPanel() {
  const totalItems=locations.reduce((s,l)=>s+(Number(l.items)||0),0);
  document.getElementById('assign-summary').textContent=`配送先: ${locations.length}件 / 合計個数: ${totalItems}個 / ドライバー: ${drivers.length}名`;
  const content=document.getElementById('assign-content'); content.innerHTML='';
  drivers.forEach((driver,dIdx)=>{
    const color=DRIVER_COLORS[dIdx%DRIVER_COLORS.length];
    const myLocs=locations.map((loc,i)=>({loc,i})).filter(({i})=>assignments[i]&&assignments[i].driverId===driver.id);
    const myItems=myLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);
    const myVol=myLocs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0);
    const block=document.createElement('div'); block.className='assign-driver-block'; block.style.borderColor=color;
    block.innerHTML=`<div class="assign-driver-header" style="background:${color}20;border-bottom:1px solid ${color}40;"><span><span style="width:12px;height:12px;border-radius:50%;background:${color};display:inline-block;margin-right:6px;"></span>${driver.name}</span><span class="assign-driver-meta">${myLocs.length}件 / ${myItems}個 / ${myVol.toFixed(1)}才</span></div><div class="assign-driver-body" id="driver-body-${driver.id}">${myLocs.length===0?'<p style="font-size:11px;color:#aaa;">未割当</p>':''}</div>`;
    content.appendChild(block);
    const body=document.getElementById(`driver-body-${driver.id}`);
    myLocs.forEach(({loc,i})=>{
      const bin=assignments[i]?assignments[i].bin:1;
      const item=document.createElement('div'); item.className='assign-stop-item';
      item.innerHTML=`<span class="asn">${loc.name}</span><span class="asm">${loc.items?loc.items+'個':''}</span><select onchange="changeAssignment(${i},'${driver.id}',this.value)"><option value="1" ${bin==1?'selected':''}>第1便</option><option value="2" ${bin==2?'selected':''}>第2便</option></select><button onclick="removeAssignment(${i})" style="background:#e74c3c;color:white;border:none;border-radius:3px;padding:1px 6px;cursor:pointer;font-size:11px;">×</button>`;
      body.appendChild(item);
    });
  });
  const unassigned=locations.map((loc,i)=>({loc,i})).filter(({i})=>!assignments[i]);
  if (unassigned.length>0) {
    const block=document.createElement('div'); block.className='assign-driver-block';
    block.innerHTML=`<div class="assign-driver-header" style="background:#eee;"><span>⬜ 未割り当て</span><span class="assign-driver-meta">${unassigned.length}件</span></div><div class="assign-driver-body" id="unassigned-body"></div>`;
    content.appendChild(block);
    const body=document.getElementById('unassigned-body');
    unassigned.forEach(({loc,i})=>{
      const item=document.createElement('div'); item.className='assign-stop-item';
      item.innerHTML=`<span class="asn">${loc.name}</span><span class="asm">${loc.items?loc.items+'個':''}</span><select onchange="assignToDriver(${i},this.value)"><option value="">-- 担当者 --</option>${drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select>`;
      body.appendChild(item);
    });
  }
}
function changeAssignment(locIdx,driverId,bin) { assignments[locIdx]={driverId:parseInt(driverId)||driverId,bin:parseInt(bin)}; renderAssignPanel(); }
function removeAssignment(locIdx) { delete assignments[locIdx]; renderAssignPanel(); }
function assignToDriver(locIdx,driverId) { if(!driverId) return; assignments[locIdx]={driverId:parseInt(driverId)||driverId,bin:1}; renderAssignPanel(); }

function autoAssign() {
  if (drivers.length===0) { alert('ドライバーを先に登録してください'); return; }
  const sorted=locations.map((loc,i)=>({loc,i,items:Number(loc.items)||0})).sort((a,b)=>b.items-a.items);
  const totals=drivers.map(()=>0); assignments={};
  sorted.forEach(({i,items})=>{
    const minIdx=totals.indexOf(Math.min(...totals));
    assignments[i]={driverId:drivers[minIdx].id,bin:1}; totals[minIdx]+=items;
  });
  renderAssignPanel(); document.getElementById('status').textContent='自動振り分け完了（手動で調整できます）';
}

function applyAssign() {
  closeAllPanels();
  markers.forEach(m=>m.setMap(null)); markers=[];
  const locs=orderedLocations.length>0?orderedLocations:locations;
  locs.forEach((loc,i)=>{
    const locIdx=locations.indexOf(loc); const asgn=assignments[locIdx];
    const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    const fillColor=driverIdx>=0?DRIVER_COLORS[driverIdx%DRIVER_COLORS.length]:'#e74c3c';
    const marker=new google.maps.Marker({ position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name, label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'}, icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2} });
    const dName=driverIdx>=0?drivers[driverIdx].name:'未割当';
    const binStr=asgn&&asgn.bin?` / 第${asgn.bin}便`:'';
    marker.addListener('click',()=>new google.maps.InfoWindow({content:`<b>${loc.name}</b><br><small>${loc.addr}</small><br><small>担当: ${dName}${binStr}</small>`}).open(map,marker));
    markers.push(marker);
  });
  updateSidebar(locs,orderedLocations.length>0);
  if (currentTab==='driver') renderDriverTab();
  document.getElementById('status').textContent='配車割り当てを地図に反映しました';
  renderDriverSidebar();
  renderRightSidebar();
  saveLocationsToSession();
}

// ===== Supabase共有 =====
async function openSharePanel() {
  if (locations.length===0) { alert('先にExcelを読み込んでください'); return; }
  if (drivers.length===0)   { alert('先にドライバーを登録してください'); return; }
  const content=document.getElementById('share-content');
  content.innerHTML='<p style="font-size:13px;color:#888;">Supabaseに保存中...</p>';
  document.getElementById('share-panel').style.display='block';
  document.getElementById('overlay').style.display='block';

  try {
    // 既存データ削除（同日・同部署）
    if (currentDeliveryId) {
      await sbClient.from('deliveries').delete().eq('id', currentDeliveryId);
    }

    // deliveriesテーブルに保存
    const { data: delData, error: delErr } = await sbClient
      .from('deliveries')
      .insert({ busho: currentBusho, delivery_date: currentDate })
      .select().single();
    if (delErr) throw delErr;
    currentDeliveryId = delData.id;

    // delivery_stopsに全店舗を保存
    const stops = locations.map((loc, i) => {
      const asgn = assignments[i];
      const driverIdx = asgn ? drivers.findIndex(d=>d.id===asgn.driverId) : -1;
      return {
        delivery_id: currentDeliveryId,
        stop_order: i + 1,
        name: loc.name,
        address: loc.addr,
        lat: loc.lat,
        lng: loc.lng,
        items: loc.items ? Number(loc.items) : null,
        vol: loc.vol ? Number(loc.vol) : null,
        driver_id: asgn ? String(asgn.driverId) : null,
        driver_name: driverIdx >= 0 ? drivers[driverIdx].name : null,
        bin: asgn ? asgn.bin : null,
        status: 'pending'
      };
    });

    const { error: stopsErr } = await sbClient.from('delivery_stops').insert(stops);
    if (stopsErr) throw stopsErr;

    // ドライバーごとのURLを生成
    const baseUrl = window.location.href.replace('index.html','') + 'driver.html';
    let html = `<p style="font-size:12px;color:#27ae60;font-weight:bold;margin-bottom:10px;">✅ 保存完了！ドライバーに以下のURLを共有してください</p>`;

    drivers.forEach(driver => {
      const myLocs = locations.filter((_,i) => assignments[i] && assignments[i].driverId === driver.id);
      if (myLocs.length === 0) return;
      const url = `${baseUrl}?delivery=${currentDeliveryId}&driver=${encodeURIComponent(driver.name)}`;
      html += `<div class="share-driver-item">
        <div>
          <div style="font-weight:bold;font-size:13px;">${driver.name}</div>
          <div style="font-size:11px;color:#888;">${myLocs.length}件</div>
        </div>
        <button class="copy-btn" onclick="copyUrl('${url}','${driver.name}')">URLをコピー</button>
      </div>`;
    });

    html += `<div style="margin-top:12px;padding:10px;background:#fff8e1;border-radius:6px;font-size:12px;color:#856404;">
      💡 ドライバーはAndroidスマホでURLを開くだけで自分の配送先が確認できます
    </div>`;
    content.innerHTML = html;

  } catch(err) {
    content.innerHTML = `<p style="color:#e74c3c;font-size:13px;">エラー: ${err.message}</p>`;
  }
}

function copyUrl(url, name) {
  navigator.clipboard.writeText(url).then(()=>{ alert(`${name}のURLをコピーしました`); }).catch(()=>{ prompt('URLをコピーしてください:', url); });
}

function exportAllDrivers() {
  if (locations.length===0) { alert('データがありません'); return; }
  const deliveryDate=getDeliveryDate(currentDate,currentBusho); const bushoName=currentBusho===1?'部署1':'部署2';
  const wb=XLSX.utils.book_new();
  drivers.forEach((driver,dIdx)=>{
    [1,2].forEach(bin=>{
      const myLocs=locations.map((loc,i)=>({loc,i})).filter(({i})=>assignments[i]&&assignments[i].driverId===driver.id&&assignments[i].bin===bin);
      if (myLocs.length===0) return;
      const wsData=[
        [`配送ルート表 【${driver.name} / 第${bin}便】`],
        [`配送日: ${deliveryDate}　【${bushoName}】`],[],
        ['順番','店舗名','住所','個数','才数','備考']
      ];
      wsData.push(['',DEPOT.name,DEPOT.addr,'','','出発']);
      myLocs.forEach(({loc},idx)=>wsData.push([idx+1,loc.name,loc.addr,loc.items!==null?loc.items:'',loc.vol!==null?loc.vol:'','']));
      wsData.push(['',DEPOT.name,DEPOT.addr,'','','帰着']);
      wsData.push([],['合計','','',myLocs.reduce((s,{loc})=>s+(Number(loc.items)||0),0),myLocs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0).toFixed(1),'']);
      const ws=XLSX.utils.aoa_to_sheet(wsData); ws['!cols']=[{wch:6},{wch:35},{wch:45},{wch:8},{wch:8},{wch:8}];
      XLSX.utils.book_append_sheet(wb,ws,`${driver.name}_${bin}便`.slice(0,31));
    });
  });
  if (wb.SheetNames.length===0) { alert('割り当てデータがありません'); return; }
  XLSX.writeFile(wb,`配車表_${currentBusho===1?'部署1':'部署2'}_${currentDate}.xlsx`);
}

function exportExcel() {
  const locs=orderedLocations.length>0?orderedLocations:locations;
  if (locs.length===0) { alert('先にデータを読み込んでください'); return; }
  const deliveryDate=getDeliveryDate(currentDate,currentBusho); const bushoName='部署1';
  const wsData=[['配送ルート表'],[`配送日: ${deliveryDate}　【${bushoName}】`],[],['順番','店舗名','住所','個数','才数','担当ドライバー','便']];
  wsData.push(['',DEPOT.name,DEPOT.addr,'','','','出発']);
  locs.forEach((loc,i)=>{
    const locIdx=locations.indexOf(loc); const asgn=assignments[locIdx];
    const driverIdx=asgn?drivers.findIndex(d=>d.id===asgn.driverId):-1;
    wsData.push([i+1,loc.name,loc.addr,loc.items!==null?loc.items:'',loc.vol!==null?loc.vol:'',driverIdx>=0?drivers[driverIdx].name:'',asgn?`第${asgn.bin}便`:'']);
  });
  wsData.push(['',DEPOT.name,DEPOT.addr,'','','','帰着']);
  wsData.push([],['合計','','',locs.reduce((s,l)=>s+(Number(l.items)||0),0),locs.reduce((s,l)=>s+(Number(l.vol)||0),0).toFixed(1),'','']);
  const fileName=`配送ルート_${bushoName}_${currentDate}.xlsx`;
  // メニューからの出力用にsessionStorageに保存
  try { sessionStorage.setItem('lastExcelData', JSON.stringify({wsData, fileName})); } catch(e){}
  const ws=XLSX.utils.aoa_to_sheet(wsData); ws['!cols']=[{wch:6},{wch:35},{wch:45},{wch:8},{wch:8},{wch:14},{wch:6}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'配送ルート');
  XLSX.writeFile(wb,fileName);
}

// ===== ユーティリティ =====

// ===== 右サイドバー =====
let rightTab = 'all';
let draggedLocIdx = null;


// ===== カード・マーカーのハイライト =====
function highlightStopCard(locIdx) {
  // 全カードのハイライトを解除
  document.querySelectorAll('.stop-card').forEach(c => c.style.outline = '');
  // 対象カードをハイライト
  document.querySelectorAll('.stop-card').forEach(c => {
    if (parseInt(c.dataset.locIdx) === locIdx) {
      c.style.outline = '2px solid #3b82f6';
      c.scrollIntoView({block:'nearest', behavior:'smooth'});
    }
  });
}

function highlightMarker(targetLoc) {
  // マーカーを一時的に大きくする
  markers.forEach(m => {
    if (m.getTitle() === targetLoc.name) {
      const origIcon = m.getIcon();
      m.setIcon({...origIcon, scale:18});
      setTimeout(() => m.setIcon(origIcon), 1500);
    }
  });
}

function unassignStop(locIdx) {
  delete assignments[locIdx];
  saveLocationsToSession();
  renderDriverSidebar();
  renderRightSidebar();
  if (routeLines.length > 0) drawRoute();
  document.getElementById('status').textContent = '割当を解除しました';
}

function setRightTab(tab) {
  rightTab = tab;
  document.getElementById('rs-tab-all').classList.toggle('active', tab==='all');
  document.getElementById('rs-tab-unassigned').classList.toggle('active', tab==='unassigned');
  renderRightSidebar();
}

function renderRightSidebar() {
  const el = document.getElementById('right-stop-list');
  const title = document.getElementById('right-sidebar-title');
  if (!el) return;

  let locs;
  if (activeDriverFilter === 'unassigned') {
    title.textContent = '未割当の配送先';
    locs = locations.map((loc, i) => ({loc, i})).filter(({i}) => !assignments[i]);
  } else if (activeDriverFilter !== null) {
    // ドライバー選択中：ルート順で表示
    const driver = drivers.find(d => d.id === activeDriverFilter);
    const dName = driver ? driver.name : '不明';
    title.textContent = `${dName} の配送先`;
    // ルート順（orderedLocations）があれば使用
    if (orderedLocations.length > 0) {
      const driverLocs = [];
      [1,2].forEach(bin => {
        const binLocs = locations.map((loc,i)=>({loc,i}))
          .filter(({i})=>assignments[i]&&assignments[i].driverId===activeDriverFilter&&assignments[i].bin===bin);
        if (binLocs.length===0) return;
        const ls = binLocs.map(({loc})=>loc);
        const ri = nearestNeighbor(ls, DEPOT);
        ri.forEach(idx => driverLocs.push({loc:ls[idx], i:locations.indexOf(ls[idx])}));
      });
      locs = driverLocs;
    } else {
      locs = locations.map((loc, i) => ({loc, i}))
        .filter(({i}) => assignments[i] && assignments[i].driverId === activeDriverFilter);
    }
  } else {
    title.textContent = '配送先リスト';
    // ルート表示済みならorderedLocations順で表示
    if (orderedLocations.length > 0) {
      locs = orderedLocations.map(loc => ({loc, i: locations.indexOf(loc)})).filter(({i}) => i >= 0);
    } else {
      locs = locations.map((loc, i) => ({loc, i}));
    }
  }

  el.innerHTML = '';

  if (locs.length === 0) {
    el.innerHTML = '<p style="font-size:11px;color:rgba(255,255,255,0.3);">表示する配送先がありません</p>';
    return;
  }

  // 合計表示
  const totalItems = locs.reduce((s,{loc})=>s+(Number(loc.items)||0),0);
  const totalVol   = locs.reduce((s,{loc})=>s+(Number(loc.vol)||0),0);
  const summary = document.createElement('div');
  summary.style.cssText = 'font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px;padding:3px 6px;background:rgba(255,255,255,0.04);border-radius:4px;';
  summary.textContent = `${locs.length}件 / ${totalItems}個 / ${totalVol.toFixed(1)}才`;
  el.appendChild(summary);

  locs.forEach(({loc, i}) => {
    const asgn = assignments[i];
    const driverIdx = asgn ? drivers.findIndex(d => d.id === asgn.driverId) : -1;
    const color = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : 'rgba(255,255,255,0.2)';

    const card = document.createElement('div');
    card.className = 'stop-card';
    card.draggable = true;
    card.dataset.locIdx = i;
    card.style.borderLeft = `3px solid ${color}`;

    const dName = driverIdx >= 0 ? drivers[driverIdx].name : '未割当';
    const bin = asgn ? `第${asgn.bin}便` : '';

    // 番号はlocs配列内の位置を使う
    const locsPos = locs.indexOf(locs.find(x => x.i === i));
    const stopNumStr = locsPos >= 0 && activeDriverFilter !== 'unassigned' && orderedLocations.length > 0
      ? String(locsPos + 1) : '';
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
            ${stopNumStr ? `<span style="background:${color};color:white;border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0;">${stopNumStr}</span>` : ''}
            <span style="font-weight:600;color:rgba(255,255,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${loc.name}</span>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:${stopNumStr?'20px':'0'};">${loc.addr}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;display:flex;gap:6px;padding-left:${stopNumStr?'20px':'0'};">
            ${loc.items ? `<span>📦${loc.items}個</span>` : ''}
            ${loc.vol   ? `<span>📐${Number(loc.vol).toFixed(1)}才</span>` : ''}
            ${asgn ? `<span style="color:${color};">${dName} ${bin}</span>` : '<span style="color:#f59e0b;">未割当</span>'}
          </div>
        </div>
        ${asgn ? `<button onclick="unassignStop(${i})" style="flex-shrink:0;background:rgba(239,68,68,0.15);color:#f87171;border:none;border-radius:3px;padding:2px 5px;font-size:9px;cursor:pointer;margin-top:2px;">解除</button>` : ''}
      </div>
    `;

    // ドラッグイベント
    card.addEventListener('dragstart', e => {
      draggedLocIdx = i;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedLocIdx = null;
    });

    // クリックでカードハイライト
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') return; // 解除ボタンは除く
      highlightStopCard(i);
      // 地図上のマーカーをハイライト
      highlightMarker(loc);
    });

    el.appendChild(card);
  });
}

function closeAllPanels() {
  const ap=document.getElementById('assign-panel'); if(ap) ap.style.display='none';
  document.getElementById('overlay').style.display='none';
}

function toggleStopList() {
  const c = document.getElementById('stop-list-content');
  const icon = document.getElementById('stop-list-toggle-icon');
  if (!c) return;
  const isOpen = c.style.display !== 'none';
  c.style.display = isOpen ? 'none' : 'block';
  icon.textContent = isOpen ? '▼' : '▲';
}

function renderDriverSidebar() {
  const el = document.getElementById('driver-list-sidebar');
  if (!el) return;
  el.innerHTML = '';
  const activeDrivers = drivers.filter(d => d.availableToday !== false);
  if (activeDrivers.length === 0) {
    el.innerHTML = `<p style="font-size:11px;color:rgba(255,255,255,0.3);padding:4px 0;">ドライバーが登録されていません<br><a href="drivers.html" style="color:#3b82f6;">ドライバー管理へ</a></p>`;
    return;
  }
  // 全員ボタン
  const allBtn = document.createElement('div');
  allBtn.className = 'driver-sb-card' + (activeDriverFilter === null ? ' active' : '');
  allBtn.style.borderLeft = '3px solid rgba(255,255,255,0.3)';
  const totalAssigned = Object.keys(assignments).length;
  allBtn.innerHTML = `<div style="display:flex;align-items:center;"><span class="driver-sb-dot" style="background:rgba(255,255,255,0.3);"></span><span class="driver-sb-name">全件表示</span></div><div class="driver-sb-meta">${activeDrivers.length}名稼働 / ${totalAssigned}件割当済</div>`;
  allBtn.onclick = () => {
    activeDriverFilter = null;
    if (routeLines.length > 0) {
      // ルート表示中なら再描画
      drawRoute();
    } else {
      // ルートなしなら全マーカー表示
      markers.forEach(m => m.setMap(null)); markers = [];
      locations.forEach((loc, i) => {
        const asgn = assignments[i];
        const driverIdx = asgn ? drivers.findIndex(d => d.id === asgn.driverId) : -1;
        const fillColor = driverIdx >= 0 ? DRIVER_COLORS[driverIdx % DRIVER_COLORS.length] : '#e74c3c';
        const marker = new google.maps.Marker({
          position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
          label:{text:String(i+1),color:'white',fontSize:'11px',fontWeight:'bold'},
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
        });
        markers.push(marker);
      });
      document.getElementById('status').textContent = `全${locations.length}件を表示しました`;
    }
    renderDriverSidebar();
    renderRightSidebar();
    // 地図範囲を全体に
    if (locations.length > 0) {
      const bounds = new google.maps.LatLngBounds();
      bounds.extend({lat:DEPOT.lat,lng:DEPOT.lng});
      locations.forEach(l => bounds.extend({lat:l.lat,lng:l.lng}));
      map.fitBounds(bounds);
    }
  };
  el.appendChild(allBtn);

  // 未割当ボタン
  const unassignedCount = locations.filter((_,i) => !assignments[i]).length;
  const unBtn = document.createElement('div');
  unBtn.className = 'driver-sb-card' + (activeDriverFilter === 'unassigned' ? ' active' : '');
  unBtn.style.borderLeft = '3px solid #f59e0b';
  unBtn.innerHTML = `<div style="display:flex;align-items:center;"><span class="driver-sb-dot" style="background:#f59e0b;"></span><span class="driver-sb-name">未割当</span></div><div class="driver-sb-meta">${unassignedCount}件未割当</div>`;
  unBtn.onclick = () => {
    activeDriverFilter = 'unassigned';
    routeLines.forEach(({line}) => line.setMap(null));
    markers.forEach(m => m.setMap(null));
    markers = [];
    // 未割当のピンを表示
    const unLocs = locations.filter((_, i) => !assignments[i]);
    unLocs.forEach((loc, idx) => {
      const marker = new google.maps.Marker({
        position:{lat:loc.lat,lng:loc.lng}, map, title:loc.name,
        label:{text:String(idx+1),color:'white',fontSize:'11px',fontWeight:'bold'},
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#f59e0b',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
      });
      marker.addListener('click', () => {
        highlightStopCard(locations.indexOf(loc));
        new google.maps.InfoWindow({content:`<b>${loc.name}</b><br><small>${loc.addr}</small>`}).open(map, marker);
      });
      markers.push(marker);
    });
    const bounds = new google.maps.LatLngBounds();
    unLocs.forEach(l => bounds.extend({lat:l.lat,lng:l.lng}));
    if (unLocs.length > 0) {
      map.fitBounds(bounds);
      // 1件だけの場合は拡大しすぎないように制限
      google.maps.event.addListenerOnce(map, 'bounds_changed', () => {
        if (map.getZoom() > 13) map.setZoom(13);
      });
    }
    document.getElementById('status').textContent = `未割当: ${unassignedCount}件`;
    renderDriverSidebar();
    renderRightSidebar();
  };
  el.appendChild(unBtn);

  // 各ドライバー（社員コード順）
  const sortedDrivers = [...activeDrivers].sort((a,b) => {
    const ca = (a.code||'zzz').toLowerCase();
    const cb = (b.code||'zzz').toLowerCase();
    return ca.localeCompare(cb);
  });
  sortedDrivers.forEach(driver => {
    const driverIdx = drivers.indexOf(driver);
    const color = DRIVER_COLORS[driverIdx % DRIVER_COLORS.length];
    const myLocs = locations.filter((_, i) => assignments[i] && assignments[i].driverId === driver.id);
    const myItems = myLocs.reduce((s, l) => s + (Number(l.items) || 0), 0);
    const card = document.createElement('div');
    card.className = 'driver-sb-card' + (activeDriverFilter === driver.id ? ' active' : '');
    card.style.borderLeft = `3px solid ${color}`;
    if (driver.yoizumiToday) card.style.background = 'rgba(139,92,246,0.15)';
    card.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;"><span class="driver-sb-dot" style="background:${color};"></span><span class="driver-sb-name">${driver.name}</span>${driver.yoizumiToday?'<span style="font-size:10px;margin-left:4px;">🌙</span>':''}</div><span style="font-size:10px;color:rgba(255,255,255,0.4);">${driver.code||''}</span></div><div class="driver-sb-meta">${myLocs.length}件 / ${myItems}個</div>`;
    // ドロップゾーン設定
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drop-target'); });
    card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drop-target');
      if (draggedLocIdx === null) return;
      const prevAsgn = assignments[draggedLocIdx];
      assignments[draggedLocIdx] = { driverId: driver.id, bin: prevAsgn ? prevAsgn.bin : 1 };
      saveLocationsToSession();
      renderRightSidebar();
      renderDriverSidebar();
      // ルート表示中なら再描画
      if (routeLines.length > 0) drawRoute();
      document.getElementById('status').textContent = `${driver.name}に移動しました`;
    });
    card.onclick = () => {
      filterRouteByDriver(driver.id);
      renderDriverSidebar();
      renderRightSidebar();
    };
    el.appendChild(card);
  });
}
function dist(a,b) { const R=111,dlat=(b.lat-a.lat)*R,dlng=(b.lng-a.lng)*R*Math.cos((a.lat+b.lat)/2*Math.PI/180); return Math.sqrt(dlat*dlat+dlng*dlng); }
function nearestNeighbor(locs,start) {
  const n=locs.length,visited=new Array(n).fill(false),route=[];
  let cur=start;
  for(let i=0;i<n;i++){let best=-1,bd=Infinity;for(let j=0;j<n;j++){if(!visited[j]){const d=dist(cur,locs[j]);if(d<bd){bd=d;best=j;}}}visited[best]=true;route.push(best);cur=locs[best];}
  return route;
}

// メニューから渡されたファイルを自動読み込み
function loadPendingFile() {
  const fileName = sessionStorage.getItem('pendingFileName');
  const fileDataStr = sessionStorage.getItem('pendingFileData');
  if (!fileName || !fileDataStr) return;
  sessionStorage.removeItem('pendingFileName');
  sessionStorage.removeItem('pendingFileData');
  try {
    const arr = JSON.parse(fileDataStr);
    const uint8 = new Uint8Array(arr);
    const ext = fileName.split('.').pop().toLowerCase();
    document.getElementById('status').textContent = `${fileName} を読み込み中...`;
    if (ext === 'csv') {
      const blob = new Blob([uint8]);
      const file = new File([blob], fileName);
      loadCSV(file);
    } else {
      const workbook = XLSX.read(uint8, { type: 'array', cellDates: true });
      const fakeEvent = {
        target: { files: [new File([new Blob([uint8])], fileName)] }
      };
      // XLSXデータを直接処理
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { raw: false });
      const rowsRaw = XLSX.utils.sheet_to_json(sheet, { raw: true });
      processExcelData(rows, rowsRaw);
    }
  } catch(e) {
    document.getElementById('status').textContent = 'ファイル読み込みエラー: ' + e.message;
  }
}

// Excel処理を関数に分離
function processExcelData(rows, rowsRaw) {
  if (rows.length === 0) { document.getElementById('status').textContent = 'データが見つかりません'; return; }
  const keys = Object.keys(rows[0]);
  const addrKey = keys.find(k => k.includes('顧客住所1') || k.includes('住所'));
  const nameKey = keys.find(k => k.includes('顧客名称') || k.includes('名称'));
  const itemKey = keys.find(k => k === '個数' || k.includes('数量'));
  const volKey  = keys.find(k => k === '才数' || k.includes('才'));
  const dateKey = keys.find(k => k.includes('日付'));
  if (!addrKey) { document.getElementById('status').textContent = '住所列が見つかりません'; return; }
  currentDate = (dateKey && rowsRaw[0][dateKey]) ? (parseExcelDate(rowsRaw[0][dateKey]) || todayStr()) : todayStr();
  markers.forEach(m=>m.setMap(null)); markers=[];
  if (routeLine) { routeLine.setMap(null); routeLine=null; }
  locations=[]; orderedLocations=[]; assignments={}; currentDeliveryId=null;
  document.getElementById('status').textContent = `${rows.length}件を地図に配置中...`;
  const geocoder = new google.maps.Geocoder();
  let processed = 0;
  rows.forEach((row,i)=>{
    const addr=row[addrKey]; const name=nameKey?row[nameKey]:`配送先${i+1}`;
    const items=itemKey?rowsRaw[i][itemKey]:null; const vol=volKey?rowsRaw[i][volKey]:null;
    if (!addr){processed++;checkDone(processed,rows.length);return;}
    geocoder.geocode({address:String(addr)},(results,status)=>{
      processed++;
      if (status==='OK'){
        const lat=results[0].geometry.location.lat(); const lng=results[0].geometry.location.lng();
        const idx=locations.length;
        locations.push({name:String(name),addr:String(addr),lat,lng,items,vol});
        const marker=new google.maps.Marker({position:{lat,lng},map,title:String(name),label:{text:String(idx+1),color:'white',fontSize:'11px',fontWeight:'bold'}});
        marker.addListener('click',()=>new google.maps.InfoWindow({content:`<div style="font-size:13px;"><b>${name}</b><br><span style="color:#666;font-size:12px;">${addr}</span>${items?`<br><span style="font-size:12px;">個数: ${items}個</span>`:''}${vol?`<span style="font-size:12px;"> / ${vol}才</span>`:''}</div>`}).open(map,marker));
        markers.push(marker);
      }
      checkDone(processed,rows.length);
    });
  });
}
