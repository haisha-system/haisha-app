<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拠点管理 | 配車管理システム</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0f1923; color: white; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    header { padding: 20px 32px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 16px; }
    .back-btn { background: rgba(255,255,255,0.08); border: none; color: white; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .back-btn:hover { background: rgba(255,255,255,0.15); }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 32px 100px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .section-title { font-size: 11px; letter-spacing: 0.15em; color: #f59e0b; font-weight: 500; margin-bottom: 12px; text-transform: uppercase; }

    /* 左：登録済みリスト */
    .depot-grid { display: flex; flex-direction: column; gap: 6px; }
    .depot-row {
      background: #161f2c; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 10px 14px;
      display: grid; grid-template-columns: 1fr auto;
      gap: 4px; align-items: center;
    }
    .depot-row:hover { border-color: rgba(255,255,255,0.18); }
    .depot-row.type-main   { border-left: 3px solid #3b82f6; }
    .depot-row.type-sub    { border-left: 3px solid #10b981; }
    .depot-row.type-own    { border-left: 3px solid #8b5cf6; }
    .depot-row.type-carrier{ border-left: 3px solid #f59e0b; }

    .depot-row-info { min-width: 0; }
    .depot-row-line1 { display: flex; align-items: center; gap: 8px; }
    .depot-row-name  { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .depot-row-line2 { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .depot-row-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 700; flex-shrink: 0; }
    .badge-main    { background: #3b82f6; color: white; }
    .badge-sub     { background: #10b981; color: white; }
    .badge-own     { background: #8b5cf6; color: white; }
    .badge-carrier { background: #f59e0b; color: #000; }

    .btn-xs { padding: 3px 10px; border-radius: 4px; border: none; font-size: 11px; cursor: pointer; font-family: inherit; }
    .btn-edit   { background: rgba(255,255,255,0.1); color: white; }
    .btn-edit:hover { background: rgba(255,255,255,0.2); }
    .btn-del    { background: rgba(239,68,68,0.15); color: #f87171; }
    .btn-del:hover { background: rgba(239,68,68,0.28); }

    /* 右：追加フォーム */
    .add-form { background: #161f2c; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }
    .add-form h3 { font-size: 13px; font-weight: 700; margin-bottom: 14px; color: rgba(255,255,255,0.8); }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .form-group label { font-size: 11px; color: rgba(255,255,255,0.4); }
    .form-group input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: white; border-radius: 5px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: #f59e0b; }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }
    .form-group select { background: white; color: #1a1a1a; border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-add { padding: 8px 18px; background: #f59e0b; color: #000; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 700; }
    .btn-add:hover { background: #d97706; }
    .btn-clr { padding: 8px 14px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: inherit; }

    /* CSV紐付け */
    .mapping-section { margin-top: 24px; }
    .mapping-row { display: flex; align-items: center; gap: 12px; padding: 8px 14px; background: #161f2c; border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .code-badge { background: rgba(255,255,255,0.08); font-family: monospace; font-size: 12px; padding: 2px 8px; border-radius: 4px; color: #93c5fd; flex-shrink: 0; }
    .mapping-row select { background: white; color: #1a1a1a; border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: inherit; flex: 1; }
    .mapping-addr { font-size: 11px; color: rgba(255,255,255,0.3); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f1923; border-top: 1px solid rgba(255,255,255,0.08); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .save-bar span { font-size: 12px; color: rgba(255,255,255,0.4); }
    .btn-save { padding: 9px 24px; background: #f59e0b; color: #000; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 700; }
    .toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 24px; border-radius: 20px; font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); z-index: 999; }
    .empty-msg { font-size: 12px; color: rgba(255,255,255,0.3); padding: 12px 0; }
    @media(max-width:700px){ .layout{grid-template-columns:1fr;} .form-row{grid-template-columns:1fr;} header{padding:16px 20px;} main{padding:16px 20px 100px;} }
  </style>
</head>
<body>
<header>
  <button class="back-btn" onclick="location.href='menu.html'">← メニュー</button>
  <div><h1>🏭 拠点管理</h1><p>デポ・運送会社の登録とCSV拠点コードの紐付け</p></div>
</header>
<main>
  <div class="layout">
    <!-- 左：登録済みリスト -->
    <div>
      <div class="section-title">登録済み拠点・運送会社</div>
      <div class="depot-grid" id="depot-list"></div>

    </div>

    <!-- 右：追加フォーム -->
    <div>
      <div class="section-title">拠点・運送会社を追加</div>
      <div class="add-form">
        <h3 id="form-title">新規登録</h3>
        <div class="form-group">
          <label>名称 *</label>
          <input type="text" id="new-name" placeholder="例：神戸西デポ、三光運輸">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>種別</label>
            <select id="new-type">
              <option value="main">メインデポ</option>
              <option value="sub">サブデポ</option>
              <option value="own">自社</option>
              <option value="carrier">運送会社</option>
            </select>
          </div>
          <div class="form-group">
            <label>運送会社コード（運送会社のみ）</label>
            <input type="text" id="new-carrier-code" placeholder="例：S001">
          </div>
        </div>
        <div class="form-group">
          <label>住所</label>
          <input type="text" id="new-addr" placeholder="例：兵庫県神戸市西区見津が丘7丁目1-3">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>CSV拠点コード</label>
            <input type="text" id="new-code" placeholder="例：2806">
          </div>
          <div class="form-group">
            <label>備考</label>
            <input type="text" id="new-note" placeholder="メモ">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-add" onclick="addDepot()">＋ 登録</button>
          <button class="btn-clr" onclick="clearForm()">クリア</button>
        </div>
      </div>
      <!-- CSV紐付け -->
      <div style="margin-top:20px;">
        <div class="section-title">CSV拠点コードの紐付け</div>
        <div id="mapping-list"></div>
        <p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:6px;">CSVを読み込むと自動認識されます</p>
      </div>
    </div>
  </div>
</main>

<div class="save-bar">
  <span>変更は自動保存されます</span>
  <button class="btn-save" onclick="location.href='menu.html'">← メニューに戻る</button>
</div>
<div class="toast" id="toast"></div>

<script>
let depots = [], mappings = {};

function loadData() {
  try {
    const d = localStorage.getItem('haisha_depots');
    const m = localStorage.getItem('haisha_mappings');
    if (d) depots = JSON.parse(d);
    if (m) mappings = JSON.parse(m);
  } catch(e) {}
  if (depots.length === 0) {
    depots = [
      { id:1, name:'神戸西デポ', type:'main', addr:'兵庫県神戸市西区見津が丘7丁目1-3', departAddr:'', csvCode:'2806', carrierCode:'', lat:34.6664, lng:135.0059 },
      { id:2, name:'丹波デポ',   type:'sub',  addr:'兵庫県丹波市氷上町氷上10',           departAddr:'', csvCode:'2805', carrierCode:'', lat:35.1167, lng:135.0167 }
    ];
    mappings = { '2806':1, '2805':2 };
    saveData();
  }
}
function saveData() {
  localStorage.setItem('haisha_depots', JSON.stringify(depots));
  localStorage.setItem('haisha_mappings', JSON.stringify(mappings));
}

const TYPE_ORDER = { main:0, sub:1, own:2, carrier:3 };
const TYPE_LABEL = { main:'メインデポ', sub:'サブデポ', own:'自社', carrier:'運送会社' };
const TYPE_CLASS = { main:'badge-main', sub:'badge-sub', own:'badge-own', carrier:'badge-carrier' };
const ROW_CLASS  = { main:'type-main', sub:'type-sub', own:'type-own', carrier:'type-carrier' };

function getSortKey(d) {
  const base = TYPE_ORDER[d.type] ?? 9;
  // 運送会社はコード順、その他は登録順（id順）
  if (d.type === 'carrier') return `${base}_${(d.carrierCode||'zzz').padStart(10,'0')}`;
  return `${base}_${String(d.id).padStart(15,'0')}`;
}

function render() {
  renderList();
  renderMappings();
}

function renderList() {
  const el = document.getElementById('depot-list');
  el.innerHTML = '';
  if (depots.length === 0) { el.innerHTML = '<p class="empty-msg">登録されていません</p>'; return; }

  const sorted = [...depots].sort((a,b) => getSortKey(a).localeCompare(getSortKey(b)));
  sorted.forEach(d => {
    const badgeClass = TYPE_CLASS[d.type] || 'badge-carrier';
    const badgeText  = TYPE_LABEL[d.type] || d.type;
    const rowClass   = ROW_CLASS[d.type]  || 'type-carrier';
    const line2parts = [];
    if (d.addr)        line2parts.push(d.addr);
    if (d.departAddr)  line2parts.push('出発:'+d.departAddr);
    if (d.carrierCode) line2parts.push('コード:'+d.carrierCode);
    if (d.csvCode)     line2parts.push('CSV:'+d.csvCode);

    const row = document.createElement('div');
    row.className = `depot-row ${rowClass}`;
    row.innerHTML = `
      <div class="depot-row-info">
        <div class="depot-row-line1">
          <span class="depot-row-name">${d.name}</span>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="depot-row-line2">${line2parts.join('　')}</div>
      </div>
      <div class="depot-row-actions">
        <button class="btn-xs btn-edit" onclick="editDepot(${d.id})">編集</button>
        <button class="btn-xs btn-del"  onclick="deleteDepot(${d.id})">削除</button>
      </div>
    `;
    el.appendChild(row);
  });
}

function renderMappings() {
  const allCodes = new Set();
  depots.forEach(d => { if (d.csvCode) allCodes.add(d.csvCode); });
  Object.keys(mappings).forEach(c => allCodes.add(c));
  const el = document.getElementById('mapping-list');
  el.innerHTML = '';
  if (allCodes.size === 0) { el.innerHTML = '<p class="empty-msg">CSVを読み込むと表示されます</p>'; return; }
  Array.from(allCodes).sort().forEach(code => {
    const cur = mappings[code];
    const depot = cur ? depots.find(d => d.id == cur) : null;
    const row = document.createElement('div');
    row.className = 'mapping-row';
    row.innerHTML = `
      <span class="code-badge">${code}</span>
      <select onchange="updateMapping('${code}',this.value)">
        <option value="">-- 未設定 --</option>
        ${depots.map(d=>`<option value="${d.id}" ${cur==d.id?'selected':''}>${d.name}</option>`).join('')}
      </select>
      <span class="mapping-addr">${depot ? (depot.addr||depot.name) : '未設定'}</span>
    `;
    el.appendChild(row);
  });
}

function addDepot() {
  const name        = document.getElementById('new-name').value.trim();
  const type        = document.getElementById('new-type').value;
  const addr        = document.getElementById('new-addr').value.trim();
  const departAddr  = '';
  const csvCode     = document.getElementById('new-code').value.trim();
  const carrierCode = document.getElementById('new-carrier-code').value.trim();
  const note        = document.getElementById('new-note').value.trim();
  if (!name) { alert('名称は必須です'); return; }
  const editId = parseInt(document.getElementById('form-title').dataset.editId || '0');
  if (editId) {
    const idx = depots.findIndex(d => d.id === editId);
    if (idx >= 0) depots[idx] = { ...depots[idx], name, type, addr, departAddr, csvCode, carrierCode, note };
    document.getElementById('form-title').textContent = '新規登録';
    document.getElementById('form-title').dataset.editId = '';
  } else {
    const id = Date.now();
    depots.push({ id, name, type, addr, departAddr, csvCode, carrierCode, note, lat:null, lng:null });
    if (csvCode) mappings[csvCode] = id;
  }
  saveData(); render(); clearForm();
  showToast(editId ? '更新しました' : '登録しました');
}

function editDepot(id) {
  const d = depots.find(x => x.id === id);
  if (!d) return;
  document.getElementById('new-name').value        = d.name;
  document.getElementById('new-type').value        = d.type;
  document.getElementById('new-addr').value        = d.addr || '';
  document.getElementById('new-code').value        = d.csvCode || '';
  document.getElementById('new-carrier-code').value= d.carrierCode || '';
  document.getElementById('new-note').value        = d.note || '';
  document.getElementById('form-title').textContent = `編集: ${d.name}`;
  document.getElementById('form-title').dataset.editId = d.id;
  window.scrollTo(0, 0);
}

function deleteDepot(id) {
  const d = depots.find(x => x.id === id);
  if (!d || !confirm(`「${d.name}」を削除しますか？`)) return;
  depots = depots.filter(x => x.id !== id);
  Object.keys(mappings).forEach(c => { if (mappings[c] == id) delete mappings[c]; });
  saveData(); render(); showToast('削除しました');
}

function updateMapping(code, depotId) {
  if (depotId) mappings[code] = parseInt(depotId);
  else delete mappings[code];
  saveData(); renderMappings();
}

function clearForm() {
  ['new-name','new-addr','new-code','new-carrier-code','new-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('new-type').value = 'main';
  document.getElementById('form-title').textContent = '新規登録';
  document.getElementById('form-title').dataset.editId = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

loadData(); render();
</script>
</body>
</html>
